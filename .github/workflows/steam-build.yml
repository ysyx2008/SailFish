name: Steam Build

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for Steam (Windows)
        run: npm run build:steam:win
        env:
          VITE_STEAM_BUILD: 'true'
      
      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-windows
          path: release/win-unpacked/
          retention-days: 7  # 保留7天，方便调试

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for Steam (macOS)
        run: npm run build:steam:mac
        env:
          VITE_STEAM_BUILD: 'true'
      
      - name: List macOS build output
        run: ls -la release/
      
      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-macos
          path: release/mac-arm64/
          retention-days: 7

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Build for Steam (Linux)
        run: npm run build:steam:linux
        env:
          VITE_STEAM_BUILD: 'true'
      
      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: steam-linux
          path: release/linux-unpacked/
          retention-days: 7
