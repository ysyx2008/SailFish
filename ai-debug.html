<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Debug Console</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="./ai-debug.css" />
    <style>
      /* ============================================
         CSS Variables - Design Tokens
         ============================================ */
      :root {
        /* Colors - Dark Theme */
        --color-bg-primary: #0d1117;
        --color-bg-secondary: #161b22;
        --color-bg-tertiary: #21262d;
        --color-bg-hover: #30363d;
        
        --color-border: #30363d;
        --color-border-hover: #484f58;
        
        --color-text-primary: #c9d1d9;
        --color-text-secondary: #8b949e;
        --color-text-muted: #6e7681;
        
        /* Accent Colors */
        --color-accent-blue: #58a6ff;
        --color-accent-green: #3fb950;
        --color-accent-yellow: #d29922;
        --color-accent-red: #f85149;
        --color-accent-purple: #bc8cff;
        --color-accent-cyan: #39c5cf;
        --color-accent-orange: #f0883e;
        
        /* Semantic Colors */
        --color-request: var(--color-accent-blue);
        --color-response: var(--color-accent-green);
        --color-error: var(--color-accent-red);
        --color-tool: var(--color-accent-purple);
        --color-tool-result: var(--color-accent-yellow);
        --color-done: var(--color-accent-cyan);
        
        /* Spacing */
        --spacing-xs: 4px;
        --spacing-sm: 8px;
        --spacing-md: 12px;
        --spacing-lg: 16px;
        --spacing-xl: 24px;
        
        /* Typography */
        --font-mono: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
        --font-size-xs: 10px;
        --font-size-sm: 11px;
        --font-size-base: 12px;
        --font-size-md: 13px;
        --font-size-lg: 14px;
        
        /* Border Radius */
        --radius-sm: 4px;
        --radius-md: 6px;
        --radius-lg: 8px;
        --radius-pill: 12px;
        
        /* Transitions */
        --transition-fast: 0.15s ease;
        --transition-normal: 0.2s ease;
      }

      /* ============================================
         Base Styles
         ============================================ */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: var(--font-mono);
        font-size: var(--font-md);
        line-height: 1.5;
        background: var(--color-bg-primary);
        color: var(--color-text-primary);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ============================================
         Layout Components
         ============================================ */

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: var(--spacing-sm) var(--spacing-lg);
        background: var(--color-bg-secondary);
        border-bottom: 1px solid var(--color-border);
        -webkit-app-region: drag;
      }

      .header__title {
        font-size: var(--font-size-lg);
        font-weight: 600;
        color: var(--color-text-primary);
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
      }

      .header__title::before {
        content: '🔬';
      }

      .header__actions {
        display: flex;
        gap: var(--spacing-sm);
        -webkit-app-region: no-drag;
      }

      /* Log File Bar */
      .log-file-bar {
        display: flex;
        align-items: center;
        gap: var(--spacing-md);
        padding: var(--spacing-xs) var(--spacing-lg);
        background: var(--color-bg-tertiary);
        border-bottom: 1px solid var(--color-border);
        font-size: var(--font-size-sm);
        color: var(--color-text-muted);
      }

      .log-file-bar__path {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: var(--font-mono);
      }

      /* Stats Bar */
      .stats-bar {
        display: flex;
        gap: var(--spacing-lg);
        padding: var(--spacing-sm) var(--spacing-lg);
        background: var(--color-bg-secondary);
        border-bottom: 1px solid var(--color-border);
        font-size: var(--font-size-base);
      }

      .stats-bar__item {
        display: flex;
        align-items: center;
        gap: var(--spacing-xs);
        color: var(--color-text-secondary);
      }

      .stats-bar__value {
        color: var(--color-accent-cyan);
        font-weight: 600;
      }

      .stats-bar__streaming {
        display: none;
      }

      .stats-bar__streaming.is-active {
        display: inline-flex;
        align-items: center;
        gap: var(--spacing-xs);
        padding: var(--spacing-xs) var(--spacing-sm);
        background: rgba(63, 185, 80, 0.15);
        border-radius: var(--radius-sm);
        font-size: var(--font-size-sm);
        color: var(--color-accent-green);
      }

      .stats-bar__streaming-dot {
        width: 6px;
        height: 6px;
        background: var(--color-accent-green);
        border-radius: 50%;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      /* Filter Bar */
      .filter-bar {
        display: flex;
        gap: var(--spacing-sm);
        padding: var(--spacing-sm) var(--spacing-lg);
        background: var(--color-bg-tertiary);
        border-bottom: 1px solid var(--color-border);
      }

      .filter-bar__spacer {
        flex: 1;
      }

      /* Filter Chips */
      .filter-chip {
        padding: var(--spacing-xs) var(--spacing-sm);
        font-size: var(--font-size-sm);
        border-radius: var(--radius-pill);
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        color: var(--color-text-secondary);
        cursor: pointer;
        transition: all var(--transition-fast);
        user-select: none;
      }

      .filter-chip:hover {
        border-color: var(--color-border-hover);
      }

      .filter-chip.is-active {
        background: var(--color-accent-blue);
        border-color: var(--color-accent-blue);
        color: white;
      }

      /* Search Box */
      .search-box {
        display: flex;
        align-items: center;
        gap: var(--spacing-xs);
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        border-radius: var(--radius-md);
        padding: var(--spacing-xs) var(--spacing-sm);
        min-width: 200px;
        transition: border-color var(--transition-fast);
      }

      .search-box:focus-within {
        border-color: var(--color-accent-blue);
      }

      .search-box__icon {
        font-size: var(--font-size-base);
        opacity: 0.6;
      }

      .search-box__input {
        flex: 1;
        background: none;
        border: none;
        outline: none;
        color: var(--color-text-primary);
        font-size: var(--font-size-base);
        font-family: inherit;
      }

      .search-box__input::placeholder {
        color: var(--color-text-muted);
      }

      .search-box__clear {
        cursor: pointer;
        color: var(--color-text-muted);
        font-size: var(--font-size-base);
        padding: 2px;
        display: none;
      }

      .search-box__clear.is-visible {
        display: block;
      }

      .search-box__clear:hover {
        color: var(--color-text-primary);
      }

      /* Main Content */
      .main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* ============================================
         Button Component
         ============================================ */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: var(--spacing-xs);
        padding: var(--spacing-xs) var(--spacing-md);
        font-size: var(--font-size-base);
        font-weight: 500;
        border-radius: var(--radius-md);
        border: 1px solid var(--color-border);
        background: var(--color-bg-tertiary);
        color: var(--color-text-primary);
        cursor: pointer;
        transition: all var(--transition-fast);
        font-family: inherit;
      }

      .btn:hover {
        background: var(--color-bg-hover);
        border-color: var(--color-border-hover);
      }

      .btn--sm {
        padding: 3px var(--spacing-sm);
        font-size: var(--font-size-sm);
      }

      .btn--danger {
        background: rgba(248, 81, 73, 0.15);
        border-color: var(--color-accent-red);
        color: var(--color-accent-red);
      }

      .btn--danger:hover {
        background: rgba(248, 81, 73, 0.25);
      }

      .btn--copy {
        padding: var(--spacing-xs) var(--spacing-sm);
        font-size: var(--font-size-sm);
        background: transparent;
        border: 1px solid var(--color-border);
        color: var(--color-text-muted);
        opacity: 0;
        transition: all var(--transition-fast);
      }

      .btn--copy.is-visible {
        opacity: 1;
      }

      .btn--copy:hover {
        background: var(--color-bg-tertiary);
        color: var(--color-text-primary);
        border-color: var(--color-border-hover);
      }

      .btn--copy.is-copied {
        color: var(--color-accent-green);
        border-color: var(--color-accent-green);
      }

      /* ============================================
         Toggle Component
         ============================================ */
      .toggle {
        display: flex;
        align-items: center;
        gap: var(--spacing-xs);
        font-size: var(--font-size-base);
        color: var(--color-text-secondary);
        cursor: pointer;
      }

      .toggle__checkbox {
        accent-color: var(--color-accent-blue);
      }

      .toggle--render {
        padding: var(--spacing-xs) var(--spacing-sm);
        background: var(--color-bg-tertiary);
        border-radius: var(--radius-sm);
        transition: all var(--transition-fast);
      }

      .toggle--render:hover {
        color: var(--color-text-primary);
      }

      .toggle--render.is-active {
        color: var(--color-accent-blue);
        background: rgba(88, 166, 255, 0.1);
      }

      /* ============================================
         Log List Component
         ============================================ */
      .log-list {
        flex: 1;
        overflow-y: auto;
        padding: var(--spacing-sm);
      }

      /* Empty State */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--color-text-muted);
        text-align: center;
        padding: 40px;
      }

      .empty-state__icon {
        font-size: 48px;
        margin-bottom: var(--spacing-lg);
        opacity: 0.5;
      }

      .empty-state__title {
        font-size: var(--font-size-lg);
        font-weight: 600;
        margin-bottom: var(--spacing-sm);
        color: var(--color-text-secondary);
      }

      .empty-state__desc {
        font-size: var(--font-size-md);
        max-width: 300px;
      }

      /* ============================================
         Log Entry Component
         ============================================ */
      .log-entry {
        margin-bottom: var(--spacing-xs);
        border-radius: var(--radius-md);
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
        overflow: hidden;
        transition: all var(--transition-fast);
      }

      .log-entry:hover {
        border-color: var(--color-border-hover);
      }

      .log-entry:hover .btn--copy {
        opacity: 1;
      }

      .log-entry.is-expanded {
        border-color: var(--color-accent-blue);
      }

      /* Log Header */
      .log-entry__header {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        padding: var(--spacing-sm) var(--spacing-md);
        cursor: pointer;
        user-select: none;
      }

      /* Log Type Badge */
      .log-entry__type {
        padding: 2px var(--spacing-sm);
        font-size: var(--font-size-xs);
        font-weight: 600;
        text-transform: uppercase;
        border-radius: var(--radius-sm);
        letter-spacing: 0.5px;
        flex-shrink: 0;
      }

      .log-entry__type--request { background: var(--color-request); color: white; }
      .log-entry__type--streaming { 
        background: var(--color-response); 
        color: white; 
        animation: streaming-pulse 1.5s ease-in-out infinite;
      }
      .log-entry__type--done { background: var(--color-done); color: var(--color-bg-primary); }
      .log-entry__type--done-tools { background: var(--color-tool); color: white; }
      .log-entry__type--error { background: var(--color-error); color: white; }
      .log-entry__type--tool-call { background: var(--color-tool); color: white; }
      .log-entry__type--tool-result { background: var(--color-tool-result); color: var(--color-bg-primary); }

      @keyframes streaming-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }

      .log-entry__time {
        font-size: var(--font-size-sm);
        color: var(--color-text-muted);
        font-family: var(--font-mono);
        flex-shrink: 0;
      }

      .log-entry__request-id {
        font-family: var(--font-mono);
        font-size: var(--font-size-xs);
        padding: 2px var(--spacing-xs);
        background: var(--color-bg-tertiary);
        border-radius: 3px;
        color: var(--color-text-muted);
        flex-shrink: 0;
      }

      .log-entry__summary {
        flex: 1;
        font-size: var(--font-size-base);
        color: var(--color-text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        user-select: text;
      }

      .log-entry__expand {
        color: var(--color-text-muted);
        font-size: var(--font-size-xs);
        transition: transform var(--transition-normal);
        flex-shrink: 0;
      }

      .log-entry.is-expanded .log-entry__expand {
        transform: rotate(90deg);
      }

      /* Log Content */
      .log-entry__content {
        display: none;
        padding: var(--spacing-md);
        border-top: 1px solid var(--color-border);
        background: var(--color-bg-primary);
        user-select: text;
      }

      .log-entry.is-expanded .log-entry__content {
        display: block;
      }

      /* ============================================
         Detail Tabs Component
         ============================================ */
      .detail-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--color-border);
        margin-bottom: var(--spacing-md);
      }

      .detail-tabs__tab {
        padding: var(--spacing-sm) var(--spacing-lg);
        font-size: var(--font-size-base);
        color: var(--color-text-muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all var(--transition-fast);
        user-select: none;
      }

      .detail-tabs__tab:hover {
        color: var(--color-text-secondary);
        background: var(--color-bg-tertiary);
      }

      .detail-tabs__tab.is-active {
        color: var(--color-accent-blue);
        border-bottom-color: var(--color-accent-blue);
      }

      .detail-panel {
        display: none;
      }

      .detail-panel.is-active {
        display: block;
      }

      /* ============================================
         JSON Viewer Component
         ============================================ */
      .json-viewer {
        font-size: var(--font-size-base);
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 400px;
        overflow-y: auto;
      }

      .json-viewer__key { color: var(--color-accent-purple); }
      .json-viewer__string { color: var(--color-accent-green); }
      .json-viewer__number { color: var(--color-accent-yellow); }
      .json-viewer__boolean { color: var(--color-accent-blue); }
      .json-viewer__null { color: var(--color-text-muted); }

      /* Raw JSON Panel */
      .raw-json {
        background: var(--color-bg-tertiary);
        border-radius: var(--radius-md);
        padding: var(--spacing-md);
        max-height: 500px;
        overflow: auto;
      }

      .raw-json pre {
        margin: 0;
        font-size: var(--font-size-sm);
        line-height: 1.5;
      }

      /* ============================================
         Messages Preview Component
         ============================================ */
      .messages-preview {
        margin-top: var(--spacing-sm);
        padding: var(--spacing-sm);
        background: var(--color-bg-tertiary);
        border-radius: var(--radius-sm);
        max-height: 600px;
        overflow-y: auto;
      }

      .message-item {
        margin-bottom: var(--spacing-sm);
        padding: var(--spacing-sm);
        border-radius: var(--radius-sm);
        background: var(--color-bg-secondary);
        border-left: 3px solid var(--color-border);
      }

      .message-item--system { border-left-color: var(--color-accent-purple); }
      .message-item--user { border-left-color: var(--color-accent-blue); }
      .message-item--assistant { border-left-color: var(--color-accent-green); }
      .message-item--tool { border-left-color: var(--color-accent-yellow); }

      .message-item--current {
        border-left-width: 4px;
        background: rgba(88, 166, 255, 0.1);
      }

      .message-item__role {
        font-size: var(--font-size-xs);
        font-weight: 600;
        text-transform: uppercase;
        color: var(--color-text-muted);
        margin-bottom: var(--spacing-xs);
      }

      .message-item__content {
        font-size: var(--font-size-base);
        color: var(--color-text-secondary);
        white-space: pre-wrap;
        word-break: break-all;
      }

      /* ============================================
         Collapsible Section Component
         ============================================ */
      .collapsible {
        margin-top: var(--spacing-sm);
        cursor: pointer;
      }

      .collapsible__header {
        display: flex;
        align-items: center;
        gap: var(--spacing-xs);
        padding: var(--spacing-xs) var(--spacing-sm);
        background: var(--color-bg-tertiary);
        border-radius: var(--radius-sm);
        font-size: var(--font-size-base);
        color: var(--color-text-secondary);
      }

      .collapsible__header:hover {
        background: var(--color-bg-hover);
      }

      .collapsible__icon {
        font-size: var(--font-size-xs);
        transition: transform var(--transition-normal);
        color: var(--color-text-muted);
      }

      .collapsible:not(.is-collapsed) .collapsible__icon {
        transform: rotate(90deg);
      }

      .collapsible__summary {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      .collapsible__content {
        display: block;
      }

      .collapsible.is-collapsed .collapsible__content {
        display: none;
      }

      /* ============================================
         History Summary Component
         ============================================ */
      .history-summary {
        margin-bottom: var(--spacing-sm);
        border-radius: var(--radius-md);
        background: var(--color-bg-secondary);
        border: 1px solid var(--color-border);
      }

      .history-summary__header {
        padding: var(--spacing-sm) var(--spacing-sm);
        gap: var(--spacing-sm);
      }

      .history-summary__label {
        font-size: var(--font-size-base);
        color: var(--color-text-secondary);
        font-weight: 500;
      }

      .history-summary__stats {
        display: flex;
        gap: var(--spacing-xs);
        margin-left: auto;
      }

      .history-badge {
        font-size: var(--font-size-xs);
        padding: 2px var(--spacing-xs);
        border-radius: var(--radius-sm);
        background: var(--color-bg-tertiary);
        color: var(--color-text-muted);
      }

      .history-badge--system { color: var(--color-accent-purple); }
      .history-badge--user { color: var(--color-accent-blue); }
      .history-badge--assistant { color: var(--color-accent-green); }
      .history-badge--tool { color: var(--color-accent-yellow); }

      .history-summary__content {
        max-height: 300px;
        overflow-y: auto;
        padding: var(--spacing-sm);
        border-top: 1px solid var(--color-border);
      }

      /* History Message */
      .history-message {
        display: flex;
        align-items: flex-start;
        gap: var(--spacing-sm);
        padding: var(--spacing-xs) var(--spacing-xs);
        font-size: var(--font-size-sm);
        border-radius: 3px;
        margin-bottom: 2px;
      }

      .history-message:hover {
        background: var(--color-bg-tertiary);
      }

      .history-message__role {
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        padding: 2px 5px;
        border-radius: 3px;
        background: var(--color-bg-tertiary);
        color: var(--color-text-muted);
        flex-shrink: 0;
        min-width: 55px;
        text-align: center;
      }

      .history-message--system .history-message__role { color: var(--color-accent-purple); }
      .history-message--user .history-message__role { color: var(--color-accent-blue); }
      .history-message--assistant .history-message__role { color: var(--color-accent-green); }
      .history-message--tool .history-message__role { color: var(--color-accent-yellow); }

      .history-message__tools {
        font-size: var(--font-size-xs);
        color: var(--color-accent-purple);
        flex-shrink: 0;
      }

      .history-message__content {
        color: var(--color-text-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      /* History Message - Collapsible */
      .history-message.is-collapsible {
        flex-direction: column;
        padding: var(--spacing-xs) var(--spacing-sm);
        background: var(--color-bg-secondary);
        border-radius: var(--radius-sm);
        margin-bottom: var(--spacing-xs);
      }

      .history-message__header {
        display: flex;
        align-items: center;
        gap: var(--spacing-sm);
        width: 100%;
        cursor: pointer;
        user-select: none;
      }

      .history-message__header:hover {
        color: var(--color-text-primary);
      }

      .history-message__preview {
        font-size: var(--font-size-sm);
        color: var(--color-text-muted);
        margin-top: var(--spacing-xs);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .history-message__full {
        display: none;
        margin-top: var(--spacing-sm);
        padding-top: var(--spacing-sm);
        border-top: 1px solid var(--color-border);
      }

      .history-message.is-collapsible.is-expanded .history-message__preview {
        display: none;
      }

      .history-message.is-collapsible.is-expanded .history-message__full {
        display: block;
      }

      .history-message.is-collapsible.is-expanded .collapsible__icon {
        transform: rotate(90deg);
      }

      .history-message__content-full {
        margin: 0;
        font-size: var(--font-size-sm);
        color: var(--color-text-secondary);
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 200px;
        overflow-y: auto;
        line-height: 1.5;
      }

      /* ============================================
         System Prompt Section
         ============================================ */
      .system-prompt-section {
        margin-bottom: var(--spacing-sm);

        background: rgba(188, 140, 255, 0.08);

      .system-prompt__header:hover {

      .system-prompt__full {

      /* ============================================
         AI Thinking Section
         ============================================ */

      /* ============================================

      .tool-call {

      .tool-call__icon {

      }

      .tool-call__name {

      .tool-call__body {

      .tool-call__section-label {

      /* ============================================

      .tool-result-item {
        font-size: var(--font-size-sm);

      .markdown-content th,

    </style>
  </head>
  <body>

          </div>
        </div>
      </div>
    </main>

    <!-- Toast Container -->
    <div class="toast" id="toast"></div>

    <script>
      /**
       * ============================================
       * AI Debug Console - Refactored Version
       * ============================================
       * 
       * Architecture:
       * - EventBus: 事件总线，模块间通信
       * - LogEntry: 日志条目模型
       * - LogStore: 状态管理
       * - LogRenderer: 渲染引擎
       * - FilterManager: 过滤器管理
       * - SearchManager: 搜索功能
       * - IPCBridge: Electron IPC 通信
       * - AIDebugApp: 主应用类
       */

      // ============================================
      // EventBus - 事件总线
      // ============================================
      class EventBus {
        constructor() {
          this.listeners = new Map()
        }

        on(event, callback) {
          if (!this.listeners.has(event)) {
            this.listeners.set(event, new Set())
          }
          this.listeners.get(event).add(callback)
          return () => this.off(event, callback)
        }

        off(event, callback) {
          if (this.listeners.has(event)) {
            this.listeners.get(event).delete(callback)
          }
        }

        emit(event, data) {
          if (this.listeners.has(event)) {
            this.listeners.get(event).forEach(callback => callback(data))
          }
        }
      }

      // ============================================
      // LogEntry - 日志条目模型
      // ============================================
      class LogEntry {
        static TYPE = {
          REQUEST_START: 'request_start',
          RESPONSE_CHUNK: 'response_chunk',
          RESPONSE_STREAMING: 'response_streaming',
          RESPONSE_DONE: 'response_done',
          RESPONSE_ERROR: 'response_error',
          TOOL_CALL: 'tool_call',
          TOOL_RESULT: 'tool_result'
        }

        static TYPE_LABELS = {
          [LogEntry.TYPE.REQUEST_START]: 'REQUEST',
          [LogEntry.TYPE.RESPONSE_STREAMING]: 'STREAMING',
          [LogEntry.TYPE.RESPONSE_CHUNK]: 'CHUNK',
          [LogEntry.TYPE.RESPONSE_DONE]: '✓ DONE',
          [LogEntry.TYPE.RESPONSE_ERROR]: 'ERROR',
          [LogEntry.TYPE.TOOL_CALL]: 'TOOL CALL',
          [LogEntry.TYPE.TOOL_RESULT]: 'TOOL RESULT'
        }

        constructor(data) {
          this.id = data.id
          this.type = data.type
          this.timestamp = data.timestamp
          this.requestId = data.requestId
          this.data = data.data
          this.model = data.model
        }

        get typeLabel() {
          if (this.type === LogEntry.TYPE.RESPONSE_DONE && this.data?.finishReason === 'tool_calls') {
            return '→ TOOLS'
          }
          return LogEntry.TYPE_LABELS[this.type] || this.type.replace('_', ' ')
        }

        get typeClass() {
          if (this.type === LogEntry.TYPE.RESPONSE_DONE && this.data?.finishReason === 'tool_calls') {
            return 'done-tools'
          }
          const classMap = {
            [LogEntry.TYPE.REQUEST_START]: 'request',
            [LogEntry.TYPE.RESPONSE_STREAMING]: 'streaming',
            [LogEntry.TYPE.RESPONSE_CHUNK]: 'streaming',
            [LogEntry.TYPE.RESPONSE_DONE]: 'done',
            [LogEntry.TYPE.RESPONSE_ERROR]: 'error',
            [LogEntry.TYPE.TOOL_CALL]: 'tool-call',
            [LogEntry.TYPE.TOOL_RESULT]: 'tool-result'
          }
          return classMap[this.type] || ''
        }

        get summary() {
          switch (this.type) {
            case LogEntry.TYPE.REQUEST_START:
              const msgCount = this.data.messages?.length || 0
              const toolCount = this.data.tools?.length || 0
              const imgMsgCount = (this.data.messages || []).filter(m => m.images?.length > 0).length
              const imgInfo = imgMsgCount > 0 ? ` | 🖼 ${imgMsgCount} 张图片` : ''
              return `${this.model || 'Unknown'} | ${msgCount} 条消息 | ${toolCount} 个工具${imgInfo}`
            
            case LogEntry.TYPE.RESPONSE_CHUNK:
              return this.data.chunk?.substring(0, 100) || ''
            
            case LogEntry.TYPE.RESPONSE_STREAMING:
              const content = this.data.content || ''
              const chunkCount = this.data.chunkCount || 0
              const preview = content.length > 80 ? content.substring(0, 80) + '...' : content
              return `${preview} (${chunkCount} chunks)`
            
            case LogEntry.TYPE.RESPONSE_DONE:
              const doneToolCount = this.data.toolCalls?.length || 0
              const doneToolInfo = doneToolCount > 0 ? ` | ${doneToolCount} 个工具调用` : ''
              return `完成 (${this.data.finishReason || 'unknown'})${doneToolInfo}`
            
            case LogEntry.TYPE.RESPONSE_ERROR:
              return this.data.error || '未知错误'
            
            case LogEntry.TYPE.TOOL_CALL:
              return `${this.data.toolCall?.name || 'unknown'}()`
            
            case LogEntry.TYPE.TOOL_RESULT:
              const status = this.data.toolResult?.success ? '✓' : '✗'
              return `${status} ${this.data.toolResult?.result?.substring(0, 80) || ''}`
            
            default:
              return ''
          }
        }

        get formattedTime() {
          const date = new Date(this.timestamp)
        return date.toLocaleTimeString('zh-CN', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          fractionalSecondDigits: 3
        })
      }

        get shortRequestId() {
          if (!this.requestId) return 'unknown'
          return this.requestId.length > 12 
            ? this.requestId.substring(0, 12) + '...' 
            : this.requestId
        }

        toJSON() {
          return {
            id: this.id,
            type: this.type,
            timestamp: this.timestamp,
            requestId: this.requestId,
            data: this.data,
            model: this.model
          }
        }
      }

      // ============================================
      // LogStore - 状态管理
      // ============================================
      class LogStore {
        constructor(eventBus) {
          this.eventBus = eventBus
          this.logs = []
          this.streamingResponses = new Map()
          this.activeRequests = new Set()
          this.stats = {
            requests: 0,
            toolCalls: 0,
            errors: 0
          }
        }

        addLog(rawEntry) {
          const entry = new LogEntry(rawEntry)
          
          // 特殊处理 response_chunk：聚合成 response_streaming
          if (entry.type === LogEntry.TYPE.RESPONSE_CHUNK) {
            this._handleResponseChunk(entry)
            return
          }
          
          // 如果是 response_done，完成对应的 streaming
          if (entry.type === LogEntry.TYPE.RESPONSE_DONE || entry.type === LogEntry.TYPE.RESPONSE_ERROR) {
            this._finalizeStreaming(entry.requestId, entry)
          }
          
          this.logs.push(entry)
          
          // 更新统计
          if (entry.type === LogEntry.TYPE.REQUEST_START) {
            this.stats.requests++
            this.activeRequests.add(entry.requestId)
          } else if (entry.type === LogEntry.TYPE.TOOL_CALL) {
            this.stats.toolCalls++
          } else if (entry.type === LogEntry.TYPE.RESPONSE_DONE) {
            // 统计工具调用数量
            const toolCallCount = entry.data?.toolCalls?.length || 0
            this.stats.toolCalls += toolCallCount
            this.activeRequests.delete(entry.requestId)
          } else if (entry.type === LogEntry.TYPE.RESPONSE_ERROR) {
            this.stats.errors++
          }
          
          this.eventBus.emit('log:added', entry)
          this.eventBus.emit('stats:changed', this.stats)
        }

        _handleResponseChunk(entry) {
          const requestId = entry.requestId
          const chunk = entry.data.chunk || ''
          
          if (!this.streamingResponses.has(requestId)) {
            const streamingEntry = new LogEntry({
              id: `streaming_${requestId}`,
              type: LogEntry.TYPE.RESPONSE_STREAMING,
              timestamp: entry.timestamp,
              requestId: requestId,
              data: {
                content: chunk,
                chunkCount: 1,
                startTime: entry.timestamp,
                lastTime: entry.timestamp
              }
            })
            
            this.streamingResponses.set(requestId, streamingEntry)
            this.logs.push(streamingEntry)
            this.eventBus.emit('log:added', streamingEntry)
          } else {
            const streamingEntry = this.streamingResponses.get(requestId)
            streamingEntry.data.content += chunk
            streamingEntry.data.chunkCount++
            streamingEntry.data.lastTime = entry.timestamp
            this.eventBus.emit('log:updated', streamingEntry)
          }
        }
        
        _finalizeStreaming(requestId, doneEntry) {
          const streamingEntry = this.streamingResponses.get(requestId)
          if (streamingEntry) {
            if (doneEntry.type === LogEntry.TYPE.RESPONSE_DONE && !doneEntry.data.response) {
              doneEntry.data.response = streamingEntry.data.content
            }
            doneEntry.data.chunkCount = streamingEntry.data.chunkCount
            doneEntry.data.streamDuration = streamingEntry.data.lastTime - streamingEntry.data.startTime
            
            const idx = this.logs.findIndex(l => l.id === streamingEntry.id)
            if (idx >= 0) {
              this.logs.splice(idx, 1)
            }
            
            this.eventBus.emit('log:removed', streamingEntry)
            this.streamingResponses.delete(requestId)
          }
        }

        findById(id) {
          return this.logs.find(l => l.id === id)
        }

        clear() {
          this.logs = []
          this.streamingResponses.clear()
          this.activeRequests.clear()
          this.stats = { requests: 0, toolCalls: 0, errors: 0 }
          this.eventBus.emit('logs:cleared')
          this.eventBus.emit('stats:changed', this.stats)
        }

        get isStreaming() {
          return this.activeRequests.size > 0
        }

        get allLogs() {
          return [...this.logs]
        }
      }

      // ============================================
      // Utility Functions - 辅助函数
      // ============================================
      
      /**
       * 安全切换折叠状态 - 检查是否有选中文本或双击/三击，避免影响复制操作
       */
      function toggleCollapse(el, className = 'is-collapsed', event) {
        // 如果是双击或三击（用于选中文本），不执行折叠
        if (event && event.detail > 1) {
          return
        }
        // 如果有选中文本，不执行折叠
        const selection = window.getSelection()
        if (selection && selection.toString().trim().length > 0) {
          return
        }
        el.classList.toggle(className)
      }
      
      /**
       * 安全切换展开状态
       */
      function toggleExpand(el, event) {
        toggleCollapse(el, 'is-expanded', event)
        }
        
      /**
       * 复制指定元素的文本内容
       */
      async function copyTextContent(elementId) {
        const el = document.getElementById(elementId)
        if (!el) return
        const text = (el.tagName === 'TEXTAREA' ? el.value : el.textContent) || ''
        if (window.app && typeof window.app._copyToClipboard === 'function') {
          await window.app._copyToClipboard(text)
          return
        }
        try {
          if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
            await navigator.clipboard.writeText(text)
          } else {
            const input = document.createElement('textarea')
            input.value = text
            input.style.position = 'fixed'
            input.style.opacity = '0'
            input.style.left = '-9999px'
            document.body.appendChild(input)
            input.select()
            document.execCommand('copy')
            document.body.removeChild(input)
          }
          if (window.app && window.app.toast) {
            window.app.toast.show('已复制到剪贴板', 'success')
          }
        } catch (err) {
          console.error('Failed to copy:', err)
        }
      }

      // ============================================
      // FilterManager - 过滤器管理
      // ============================================
      class FilterManager {
        constructor(eventBus, container) {
          this.eventBus = eventBus
          this.container = container
          this.currentFilter = 'all'
          this._bindEvents()
        }

        _bindEvents() {
          this.container.querySelectorAll('.filter-chip').forEach(chip => {
            chip.addEventListener('click', () => this._onChipClick(chip))
          })
        }

        _onChipClick(chip) {
          this.container.querySelector('.filter-chip.is-active')?.classList.remove('is-active')
          chip.classList.add('is-active')
          this.currentFilter = chip.dataset.filter
          this.eventBus.emit('filter:changed', this.currentFilter)
        }

        matchesFilter(entry) {
          if (this.currentFilter === 'all') return true
          if (this.currentFilter === 'response_chunk') {
            return entry.type === LogEntry.TYPE.RESPONSE_CHUNK || 
                   entry.type === LogEntry.TYPE.RESPONSE_STREAMING
          }
          return entry.type === this.currentFilter
        }
        }
        
      // ============================================
      // SearchManager - 搜索管理
      // ============================================
      class SearchManager {
        constructor(eventBus, input, clearBtn) {
          this.eventBus = eventBus
          this.input = input
          this.clearBtn = clearBtn
          this.query = ''
          this._bindEvents()
        }

        _bindEvents() {
          this.input.addEventListener('input', (e) => this._onInput(e.target.value))
          this.clearBtn.addEventListener('click', () => this.clear())
        }

        _onInput(value) {
          this.query = value.trim().toLowerCase()
          this.clearBtn.classList.toggle('is-visible', this.query.length > 0)
          this.eventBus.emit('search:changed', this.query)
        }

        clear() {
          this.query = ''
          this.input.value = ''
          this.clearBtn.classList.remove('is-visible')
          this.eventBus.emit('search:changed', this.query)
        }

        matchesSearch(entry) {
          if (!this.query) return true
          const jsonStr = JSON.stringify(entry.toJSON()).toLowerCase()
          return jsonStr.includes(this.query)
        }
        }
        
      // ============================================
      // MarkdownRenderer - Markdown 渲染器
      // ============================================
      class MarkdownRenderer {
        constructor() {
          this.enabled = true
          this._configureMarked()
        }

        _configureMarked() {
          if (typeof marked !== 'undefined') {
            marked.setOptions({
              breaks: false,  // 不把单个换行转为 <br>，只有空行才分段
              gfm: true
            })
          }
        }

        toggle() {
          this.enabled = !this.enabled
          return this.enabled
        }

        render(text) {
          if (!text) return ''
          if (!this.enabled) return this.escapeHtml(text)
          
          // 清理连续空行（多个换行符合并为两个，即一个空行）
          let cleanedText = text.replace(/\n{3,}/g, '\n\n')
          // 清理行首/行尾的空白行
          cleanedText = cleanedText.replace(/^\s*\n/, '').replace(/\n\s*$/, '')
          
          try {
            if (typeof marked !== 'undefined') {
              let html = marked.parse(cleanedText)
              // 移除空的 <p></p> 标签
              html = html.replace(/<p>\s*<\/p>/g, '')
              return html
            }
            return this._simpleRender(cleanedText)
          } catch (e) {
            console.error('Markdown render error:', e)
            return this._simpleRender(cleanedText)
          }
        }

        _simpleRender(text) {
          let html = this.escapeHtml(text)
          html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
          html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>')
          html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>')
          html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>')
          html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>')
          html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          html = html.replace(/^- (.+)$/gm, '<li>$1</li>')
          html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
          html = html.replace(/^---+$/gm, '<hr>')
          // 空行转为段落分隔，单个换行保留为空格
          html = html.replace(/\n\n+/g, '</p><p>')
          html = html.replace(/\n/g, ' ')
          html = '<p>' + html + '</p>'
        return html
      }
      
        escapeHtml(text) {
          if (!text) return ''
          return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
        }
      }

      // ============================================
      // LogRenderer - 渲染引擎
      // ============================================
      class LogRenderer {
        constructor(eventBus, store, container, markdownRenderer) {
          this.eventBus = eventBus
          this.store = store
          this.container = container
          this.markdown = markdownRenderer
          this.emptyState = document.getElementById('emptyState').cloneNode(true)
          this._tabIdCounter = 0
        }

        render(logs) {
          this.container.innerHTML = ''
          
          if (logs.length === 0) {
            this.container.appendChild(this.emptyState.cloneNode(true))
            return
          }
          
          logs.forEach(entry => {
            this.container.appendChild(this._createLogElement(entry))
          })
        }

        renderEmpty(message) {
          this.container.innerHTML = `
            <div class="empty-state">
              <div class="empty-state__icon">🔍</div>
              <div class="empty-state__title">未找到匹配结果</div>
              <div class="empty-state__desc">没有找到包含 "${this.markdown.escapeHtml(message)}" 的日志</div>
              </div>
            `
          }

        appendLog(entry) {
          const empty = this.container.querySelector('.empty-state')
          if (empty) empty.remove()
          this.container.appendChild(this._createLogElement(entry))
      }

        removeLog(entry) {
          const el = this.container.querySelector(`[data-id="${entry.id}"]`)
          if (el) el.remove()
        }

        updateLog(entry) {
          const el = this.container.querySelector(`[data-id="${entry.id}"]`)
          if (el) {
            el.querySelector('.log-entry__summary').textContent = entry.summary
            if (el.classList.contains('is-expanded')) {
              el.querySelector('.log-entry__content').innerHTML = this._renderLogContent(entry)
            }
          }
        }

        scrollToBottom() {
          this.container.scrollTop = this.container.scrollHeight
        }

        _createLogElement(entry) {
          const div = document.createElement('div')
          div.className = 'log-entry'
          div.dataset.id = entry.id
          div.dataset.type = entry.type
          if (entry.requestId) {
            div.dataset.requestId = entry.requestId
          }
          
          div.innerHTML = `
            <div class="log-entry__header">
              <span class="log-entry__request-id">${entry.requestId || 'unknown'}</span>
              <span class="log-entry__time">${entry.formattedTime}</span>
              <span class="log-entry__type log-entry__type--${entry.typeClass}">${entry.typeLabel}</span>
              <span class="log-entry__summary">${this.markdown.escapeHtml(entry.summary)}</span>
              <button type="button" class="btn btn--copy" data-action="copy">📋 复制</button>
              <span class="log-entry__expand">▶</span>
            </div>
            <div class="log-entry__content">
              ${this._renderLogContent(entry)}
            </div>
          `
          
          div.querySelector('.log-entry__header').addEventListener('click', (e) => {
            const copyBtn = e.target.closest('[data-action="copy"]')
            if (copyBtn) {
              e.preventDefault()
              e.stopPropagation()
              this.eventBus.emit('entry:copy', entry)
              return
            }
            div.classList.toggle('is-expanded')
          })
          
          return div
        }

        _renderLogContent(entry) {
          const tabsId = `tabs_${++this._tabIdCounter}`
          const rawJson = JSON.stringify(entry.toJSON(), null, 2)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
        
          let summaryContent = ''
          
          switch (entry.type) {
            case LogEntry.TYPE.REQUEST_START:
          if (entry.data.messages) {
                summaryContent += '<strong>Messages:</strong>' + this._renderMessages(entry.data.messages)
          }
              if (entry.data.tools?.length > 0) {
            const toolNames = entry.data.tools.map(t => t.function?.name || t).join(', ')
            summaryContent += `
              <br><strong>Tools:</strong>
                  <div class="collapsible is-collapsed" onclick="event.stopPropagation(); toggleCollapse(this, 'is-collapsed', event)">
                    <div class="collapsible__header">
                      <span class="collapsible__icon">▶</span>
                      <span class="collapsible__summary">${entry.data.tools.length} 个工具: ${toolNames}</span>
                </div>
                    <div class="collapsible__content">
                      <div class="json-viewer">${this._formatJson(entry.data.tools)}</div>
                </div>
              </div>
            `
          }
              break
              
            case LogEntry.TYPE.RESPONSE_STREAMING:
              const streamingContent = this.markdown.render(entry.data.content || '')
          summaryContent = `
                <div style="margin-bottom: 8px; font-size: 11px; color: var(--color-text-muted);">
              已接收 ${entry.data.chunkCount} 个 chunks
            </div>
                <div class="markdown-content">${streamingContent}</div>
              `
              break
              
            case LogEntry.TYPE.RESPONSE_DONE:
          const duration = entry.data.streamDuration ? ` (${entry.data.streamDuration}ms)` : ''
          const chunks = entry.data.chunkCount ? ` | ${entry.data.chunkCount} chunks` : ''
              const respContent = this.markdown.render(entry.data.response || '')
              const reasoningContent = entry.data.reasoningContent
              const reasoningHtml = reasoningContent ? this.markdown.render(reasoningContent) : ''
              const toolCallsHtml = this._renderToolCalls(entry.data.toolCalls)
            summaryContent = `
                <div style="margin-bottom: 8px; font-size: 11px; color: var(--color-text-muted);">
                完成原因: ${entry.data.finishReason || 'unknown'}${chunks}${duration}
              </div>
                ${reasoningHtml ? `
                  <details style="margin-bottom: 12px; border: 1px solid var(--color-border); border-radius: var(--radius-md); overflow: hidden;">
                    <summary style="padding: 8px 12px; background: var(--color-bg-tertiary); cursor: pointer; font-size: 12px; color: var(--color-accent-purple);">
                      🤔 思考过程（点击展开/折叠）
                    </summary>
                    <div style="padding: 12px; background: var(--color-bg-secondary); max-height: 400px; overflow-y: auto;">
                      <div class="markdown-content" style="font-size: 12px; line-height: 1.6; color: var(--color-text-secondary);">${reasoningHtml}</div>
                    </div>
                  </details>
                ` : ''}
                ${respContent ? `<div class="markdown-content">${respContent}</div>` : ''}
                ${toolCallsHtml}
                ${entry.data.usage ? `<div style="margin-top: 8px; font-size: 11px; color: var(--color-text-muted);">Token 用量: ${JSON.stringify(entry.data.usage)}</div>` : ''}
            `
              break
              
            case LogEntry.TYPE.TOOL_CALL:
              summaryContent += '<div class="json-viewer">' + this._formatJson(entry.data) + '</div>'
              break
              
            case LogEntry.TYPE.TOOL_RESULT:
          const success = entry.data.toolResult?.success
          const result = entry.data.toolResult?.result || ''
          const error = entry.data.toolResult?.error || ''
          summaryContent = `
            <div style="margin-bottom: 8px;">
                  <span style="color: ${success ? 'var(--color-accent-green)' : 'var(--color-accent-red)'}">
                ${success ? '✓ 执行成功' : '✗ 执行失败'}
              </span>
            </div>
                ${result ? `<div class="json-viewer" style="white-space: pre-wrap;">${this.markdown.escapeHtml(result)}</div>` : ''}
                ${error ? `<div style="color: var(--color-accent-red); margin-top: 8px;">${this.markdown.escapeHtml(error)}</div>` : ''}
          `
              break
              
            default:
              summaryContent = '<div class="json-viewer">' + this._formatJson(entry.data) + '</div>'
          }
          
          return `
            <div data-tabs-id="${tabsId}">
              <div class="detail-tabs">
                <div class="detail-tabs__tab is-active" data-tab="summary" onclick="window.app.switchTab('${tabsId}', 'summary')">📋 摘要</div>
                <div class="detail-tabs__tab" data-tab="raw" onclick="window.app.switchTab('${tabsId}', 'raw')">{ } 原始数据</div>
              </div>
              <div class="detail-panel is-active" data-panel="summary">${summaryContent}</div>
              <div class="detail-panel" data-panel="raw">
                <button class="btn btn--sm" style="margin-bottom: 8px;" onclick="event.stopPropagation(); window.app.copyRaw('${entry.id}')">📋 复制 JSON</button>
                <div class="raw-json"><pre>${rawJson}</pre></div>
              </div>
              </div>
            `
          }

        _renderMessages(messages) {
          if (!messages?.length) return ''
          
          // 1. 提取 System Prompt（通常是第一条 system 消息）
          const systemPrompt = messages.find(m => m.role === 'system')
          
          // 2. 找关键位置
          const lastMsg = messages[messages.length - 1]
          
          // 找最后一个 assistant 消息的位置
          let lastAssistantIndex = -1
          for (let i = messages.length - 1; i >= 0; i--) {
            if (messages[i].role === 'assistant') {
              lastAssistantIndex = i
              break
            }
          }
          
          // 找最后一个 user 消息的位置
          let lastUserIndex = -1
          for (let i = messages.length - 1; i >= 0; i--) {
            if (messages[i].role === 'user') {
              lastUserIndex = i
              break
            }
          }
          
          // 3. 判断本次请求的类型
          const isToolResultRequest = lastMsg.role === 'tool'
          
          // 4. 获取本轮新增的 tool 结果（最后一个 assistant 之后的 tool 消息）
          const newToolResults = isToolResultRequest && lastAssistantIndex >= 0
            ? messages.slice(lastAssistantIndex + 1).filter(m => m.role === 'tool')
            : []
          
          // 5. 计算历史消息（排除 system 和本轮新增内容）
          let historyEndIndex
          if (isToolResultRequest) {
            historyEndIndex = lastAssistantIndex + 1 // 包含最后一个 assistant
          } else if (lastUserIndex >= 0) {
            historyEndIndex = lastUserIndex
            } else {
            historyEndIndex = messages.length
          }
          
          // 历史消息排除 system prompt
          const historyMessages = messages
            .slice(0, historyEndIndex)
            .filter(m => m.role !== 'system')
          
          const userCount = historyMessages.filter(m => m.role === 'user').length
          const assistantCount = historyMessages.filter(m => m.role === 'assistant').length
          const toolCount = historyMessages.filter(m => m.role === 'tool').length
          const hasHistory = historyMessages.length > 0
          
          // 最新的 user 消息
          const latestUserMsg = !isToolResultRequest && lastUserIndex >= 0 
            ? messages[lastUserIndex] 
            : null
          
          let html = '<div class="messages-preview">'
          
          // === 1. System Prompt 单独显示 ===
          if (systemPrompt) {
            const sysContent = systemPrompt.content || ''
            const isLong = sysContent.length > 300
            const sysContentId = `sys_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`
            // System Prompt 使用纯文本显示，不用 Markdown 渲染
            const sysEscaped = this.markdown.escapeHtml(sysContent)
            html += `
              <div class="system-prompt-section collapsible${isLong ? ' is-collapsed' : ''}">
                <div class="system-prompt__header collapsible__header" onclick="event.stopPropagation(); this.parentElement.classList.toggle('is-collapsed')">
                  <span class="collapsible__icon">▶</span>
                  <span class="system-prompt__icon">📋</span>
                  <span class="system-prompt__label">System Prompt</span>
                  <span class="system-prompt__length">${sysContent.length} 字符</span>
                  <button class="btn btn--sm system-prompt__copy" onclick="event.stopPropagation(); copyTextContent('${sysContentId}')">📋 复制</button>
              </div>
                <textarea id="${sysContentId}" style="display:none;">${sysEscaped}</textarea>
                <div class="collapsible__content system-prompt__content">
                  <div class="system-prompt__full">${sysEscaped}</div>
              </div>
            </div>
          `
          }
          
          // === 2. 对话历史（折叠） ===
          if (hasHistory) {
            html += `
              <div class="history-summary collapsible is-collapsed" onclick="event.stopPropagation(); toggleCollapse(this, 'is-collapsed', event)">
                <div class="collapsible__header history-summary__header">
                  <span class="collapsible__icon">▶</span>
                  <span class="history-summary__label">💬 对话历史</span>
                  <span class="history-summary__stats">
                    ${userCount > 0 ? `<span class="history-badge history-badge--user">${userCount} user</span>` : ''}
                    ${assistantCount > 0 ? `<span class="history-badge history-badge--assistant">${assistantCount} assistant</span>` : ''}
                    ${toolCount > 0 ? `<span class="history-badge history-badge--tool">${toolCount} tool</span>` : ''}
              </span>
            </div>
                <div class="collapsible__content history-summary__content">
                  ${this._renderHistoryMessages(historyMessages)}
                </div>
              </div>
            `
      }

          // === 3. 本次输入/工具结果 ===
          if (newToolResults.length > 0) {
            const toolResultsHtml = newToolResults.map(t => {
              const content = t.content || ''
              const isLong = content.length > 200
              const preview = content.substring(0, 150).replace(/\n/g, ' ')
              
              if (isLong) {
          return `
                  <div class="tool-result-item is-collapsible is-collapsed">
                    <div class="tool-result-item__header" onclick="event.stopPropagation(); this.parentElement.classList.toggle('is-collapsed')">
                      <span class="collapsible__icon">▶</span>
                      <span class="tool-result-item__preview">${this.markdown.escapeHtml(preview)}...</span>
              </div>
                    <div class="tool-result-item__full">
                      <pre class="tool-result-item__content">${this.markdown.escapeHtml(content)}</pre>
              </div>
            </div>
          `
              }
              return `<div class="tool-result-item"><pre class="tool-result-item__content">${this.markdown.escapeHtml(content)}</pre></div>`
            }).join('')
            
            html += `
              <div class="message-item message-item--tool message-item--current">
                <div class="message-item__role">
                  <span style="color: var(--color-accent-yellow);">🔄 本轮工具结果 (${newToolResults.length})</span>
              </div>
                <div>${toolResultsHtml}</div>
              </div>
            `
          } else if (latestUserMsg) {
            const content = latestUserMsg.content || ''
            const userImages = latestUserMsg.images
            const imageHtml = userImages?.length > 0
              ? `<div style="margin-top: 4px; font-size: 11px; color: var(--color-accent-cyan);">🖼 附带图片: ${userImages.map(i => this.markdown.escapeHtml(i)).join(', ')}</div>`
              : ''
            html += `
              <div class="message-item message-item--user message-item--current">
                <div class="message-item__role">
                  <span style="color: var(--color-accent-blue);">✨ 本次输入</span>
                </div>
                <div class="message-item__content">${this.markdown.escapeHtml(content)}</div>
                ${imageHtml}
            </div>
          `
          }
          
          html += '</div>'
          return html
        }

        _renderHistoryMessages(messages) {
          return messages.map(msg => {
            let content = msg.content || ''
            let extraInfo = ''
            
            if (msg.images?.length > 0) {
              extraInfo += `<span class="history-message__tools">🖼 ${msg.images.join(', ')}</span>`
            }
            if (msg.role === 'assistant' && msg.tool_calls?.length > 0) {
              const toolNames = msg.tool_calls.map(tc => tc.function?.name || 'unknown').join(', ')
              extraInfo += `<span class="history-message__tools">🔧 ${toolNames}</span>`
              if (!content) content = '[工具调用]'
            }
            
            const isLong = content.length > 150
            const preview = content.substring(0, 120).replace(/\n/g, ' ')
            
            if (isLong) {
              return `
                <div class="history-message history-message--${msg.role} is-collapsible">
                  <div class="history-message__header" onclick="event.stopPropagation(); this.parentElement.classList.toggle('is-expanded')">
                    <span class="history-message__role">${msg.role}</span>
                    ${extraInfo}
                    <span class="collapsible__icon" style="margin-left: auto;">▶</span>
          </div>
                  <div class="history-message__preview">${this.markdown.escapeHtml(preview)}...</div>
                  <div class="history-message__full">
                    <pre class="history-message__content-full">${this.markdown.escapeHtml(content)}</pre>
                  </div>
          </div>
        `
            }
            
            return `
              <div class="history-message history-message--${msg.role}">
                <span class="history-message__role">${msg.role}</span>
                ${extraInfo}
                <span class="history-message__content">${this.markdown.escapeHtml(preview)}</span>
              </div>
            `
          }).join('')
        }

        _renderToolCalls(toolCalls) {
          if (!toolCalls || toolCalls.length === 0) return ''
          
          const toolsHtml = toolCalls.map(tc => {
            const name = tc?.name || 'unknown'
            let args = ''
            try {
              const argsObj = typeof tc?.arguments === 'string' ? JSON.parse(tc.arguments) : tc?.arguments
              args = JSON.stringify(argsObj, null, 2)
            } catch (e) {
              args = tc?.arguments || ''
            }
            const argsEscaped = this.markdown.escapeHtml(args)
            
            return `
              <div class="tool-call">
                <div class="tool-call__header">
                  <span class="tool-call__icon">🔧</span>
                  <span class="tool-call__name">${this.markdown.escapeHtml(name)}()</span>
                </div>
                <div class="tool-call__body">
                  <div class="tool-call__section-label">参数</div>
                  <pre class="tool-call__args">${argsEscaped}</pre>
                </div>
              </div>
            `
          }).join('')
          
          return `
            <div style="margin-top: 12px;">
              <div style="font-size: 12px; font-weight: 600; color: var(--color-accent-purple); margin-bottom: 8px;">
                🔧 工具调用 (${toolCalls.length})
              </div>
              ${toolsHtml}
            </div>
          `
        }

        _formatJson(obj, indent = 0) {
          if (obj === null) return '<span class="json-viewer__null">null</span>'
          if (obj === undefined) return '<span class="json-viewer__null">undefined</span>'
          
          const type = typeof obj
          
          if (type === 'string') {
            const escaped = obj.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            return `<span class="json-viewer__string">"${escaped}"</span>`
          }
          if (type === 'number') return `<span class="json-viewer__number">${obj}</span>`
          if (type === 'boolean') return `<span class="json-viewer__boolean">${obj}</span>`
          
          if (Array.isArray(obj)) {
            if (obj.length === 0) return '[]'
            const items = obj.map(item => '  '.repeat(indent + 1) + this._formatJson(item, indent + 1))
            return `[\n${items.join(',\n')}\n${'  '.repeat(indent)}]`
          }
          
          if (type === 'object') {
            const keys = Object.keys(obj)
            if (keys.length === 0) return '{}'
            const items = keys.map(key => {
              const escapedKey = key.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
              return `${'  '.repeat(indent + 1)}<span class="json-viewer__key">"${escapedKey}"</span>: ${this._formatJson(obj[key], indent + 1)}`
            })
            return `{\n${items.join(',\n')}\n${'  '.repeat(indent)}}`
          }
          
          return String(obj)
        }
      }

      // ============================================
      // ToastManager - Toast 提示管理
      // ============================================
      class ToastManager {
        constructor(element) {
          this.element = element
          this.timer = null
        }

        show(message, type = 'info') {
          if (this.timer) {
            clearTimeout(this.timer)
          }
          
          this.element.textContent = message
          this.element.className = `toast${type === 'success' ? ' toast--success' : ''}`
          
          requestAnimationFrame(() => {
            this.element.classList.add('is-visible')
          })
          
          this.timer = setTimeout(() => {
            this.element.classList.remove('is-visible')
          }, 2000)
        }
      }

      // ============================================
      // IPCBridge - Electron IPC 通信
      // ============================================
      class IPCBridge {
        constructor(eventBus) {
          this.eventBus = eventBus
          this.api = window.electronAPI
          this._setupListeners()
        }
        
        get isAvailable() {
          return !!this.api
        }

        _setupListeners() {
          if (!this.api) return
          
          this.api.onAiDebugMessage((message) => {
            if (message.type === 'log') {
              this.eventBus.emit('ipc:log', message.entry)
            } else if (message.type === 'clear') {
              this.eventBus.emit('ipc:clear')
            }
          })
        }

        async getLogs() {
          if (!this.api) return []
          return await this.api.aiDebugGetLogs() || []
        }

        async getLogFilePath() {
          if (!this.api) return null
          return await this.api.aiDebugGetLogFilePath()
        }

        async getLogDir() {
          if (!this.api) return null
          return await this.api.aiDebugGetLogDir()
        }

        async clearLogs() {
          if (!this.api) return
          await this.api.aiDebugClearLogs()
        }

        openPath(path) {
          if (!this.api) return
          this.api.shell.openPath(path)
        }

        async writeClipboard(text) {
          if (!this.api || typeof this.api.aiDebugWriteClipboard !== 'function') return false
          try {
            await this.api.aiDebugWriteClipboard(text)
            return true
          } catch (e) {
            console.error('IPC writeClipboard failed:', e)
            return false
          }
        }
      }

      // ============================================
      // AIDebugApp - 主应用类
      // ============================================
      class AIDebugApp {
        constructor() {
          this.eventBus = new EventBus()
          this.store = new LogStore(this.eventBus)
          this.markdown = new MarkdownRenderer()
          this.toast = new ToastManager(document.getElementById('toast'))
          this.ipc = new IPCBridge(this.eventBus)
          
          this.filterManager = new FilterManager(
            this.eventBus,
            document.getElementById('filterBar')
          )
          
          this.searchManager = new SearchManager(
            this.eventBus,
            document.getElementById('searchInput'),
            document.getElementById('searchClear')
          )
          
          this.renderer = new LogRenderer(
            this.eventBus,
            this.store,
            document.getElementById('logList'),
            this.markdown
          )
          
          this.autoScroll = true
          
          this._setupEventListeners()
          this._setupUIBindings()
          this._loadInitialData()
            }

        _setupEventListeners() {
          // Store events
          this.eventBus.on('log:added', (entry) => {
            if (this._shouldShowEntry(entry)) {
              this.renderer.appendLog(entry)
              if (this.autoScroll) {
                this.renderer.scrollToBottom()
              }
            }
          })
          
          this.eventBus.on('log:updated', (entry) => {
            if (this._shouldShowEntry(entry)) {
              this.renderer.updateLog(entry)
              if (this.autoScroll) {
                this.renderer.scrollToBottom()
              }
            }
          })
          
          this.eventBus.on('log:removed', (entry) => {
            this.renderer.removeLog(entry)
          })
          
          this.eventBus.on('logs:cleared', () => {
            this._renderFilteredLogs()
          })
          
          this.eventBus.on('stats:changed', (stats) => {
            this._updateStats(stats)
          })
          
          // Filter & Search events
          this.eventBus.on('filter:changed', () => {
            this._renderFilteredLogs()
          })
          
          this.eventBus.on('search:changed', () => {
            this._renderFilteredLogs()
          })
          
          // IPC events
          this.eventBus.on('ipc:log', (entry) => {
            this.store.addLog(entry)
          })
          
          this.eventBus.on('ipc:clear', () => {
            this.store.clear()
          })
          
          // Entry events
          this.eventBus.on('entry:copy', (entry) => {
            this._copyToClipboard(JSON.stringify(entry.toJSON(), null, 2))
          })
        }

        _setupUIBindings() {
          // Auto scroll toggle
          document.getElementById('autoScrollToggle').addEventListener('change', (e) => {
            this.autoScroll = e.target.checked
          })
          
          // Markdown toggle
          const mdToggle = document.getElementById('markdownToggle')
          mdToggle.addEventListener('click', () => {
            const enabled = this.markdown.toggle()
            mdToggle.classList.toggle('is-active', enabled)
            this._renderFilteredLogs()
          })
          mdToggle.classList.toggle('is-active', this.markdown.enabled)
          
          // Copy all
          document.getElementById('copyAllBtn').addEventListener('click', () => {
            this._copyAllLogs()
          })
          
          // Open log directory
          document.getElementById('openLogDirBtn').addEventListener('click', async () => {
            const logDir = await this.ipc.getLogDir()
            if (logDir) {
              this.ipc.openPath(logDir)
            }
          })
          
          // Clear logs
          document.getElementById('clearLogsBtn').addEventListener('click', async () => {
            this.store.clear()
            await this.ipc.clearLogs()
          })
          
          // Copy path
          document.getElementById('copyPathBtn').addEventListener('click', async () => {
            const path = document.getElementById('logFilePath').textContent
            if (path && path !== '正在创建...' && path !== '无') {
              this._copyToClipboard(path)
            }
          })
        }

        async _loadInitialData() {
          // Load existing logs
          const existingLogs = await this.ipc.getLogs()
          existingLogs.forEach(entry => this.store.addLog(entry))
          
          // Update log file path
          this._updateLogFilePath()
          setTimeout(() => this._updateLogFilePath(), 1000)
        }

        async _updateLogFilePath() {
          const path = await this.ipc.getLogFilePath()
          document.getElementById('logFilePath').textContent = path || '无'
        }

        _shouldShowEntry(entry) {
          return this.filterManager.matchesFilter(entry) && 
                 this.searchManager.matchesSearch(entry)
        }

        _renderFilteredLogs() {
          const filteredLogs = this.store.allLogs.filter(entry => this._shouldShowEntry(entry))
          
          if (filteredLogs.length === 0 && this.searchManager.query) {
            this.renderer.renderEmpty(this.searchManager.query)
          } else {
            this.renderer.render(filteredLogs)
          }
          
          if (this.autoScroll) {
            this.renderer.scrollToBottom()
        }
      }

        _updateStats(stats) {
          document.getElementById('requestCount').textContent = stats.requests
          document.getElementById('toolCallCount').textContent = stats.toolCalls
          document.getElementById('errorCount').textContent = stats.errors
          
          const streamingEl = document.getElementById('streamingStatus')
          streamingEl.classList.toggle('is-active', this.store.isStreaming)
        }

        async _copyToClipboard(text) {
        try {
          // 优先使用主进程剪贴板（在调试窗口内最可靠）
          if (this.ipc.isAvailable && typeof this.ipc.writeClipboard === 'function') {
            const ok = await this.ipc.writeClipboard(text)
            if (ok) {
              this.toast.show('已复制到剪贴板', 'success')
              return true
            }
          }
          if (navigator.clipboard && typeof navigator.clipboard.writeText === 'function') {
            await navigator.clipboard.writeText(text)
          } else {
            const input = document.createElement('textarea')
            input.value = text
            input.style.position = 'fixed'
            input.style.opacity = '0'
            input.style.left = '-9999px'
            document.body.appendChild(input)
            input.select()
            document.execCommand('copy')
            document.body.removeChild(input)
          }
          this.toast.show('已复制到剪贴板', 'success')
          return true
        } catch (err) {
          console.error('Failed to copy:', err)
          return false
        }
      }

        async _copyAllLogs() {
          const logs = this.store.allLogs
        if (logs.length === 0) {
            this.toast.show('没有日志可复制')
          return
        }
        
        const text = logs.map(entry => {
          const time = new Date(entry.timestamp).toISOString()
          return `[${time}] [${entry.type}] ${JSON.stringify(entry.data)}`
        }).join('\n')
        
          if (await this._copyToClipboard(text)) {
            this.toast.show(`已复制 ${logs.length} 条日志`, 'success')
        }
      }

        // Public API for inline handlers
        switchTab(tabsId, tabName) {
          const container = document.querySelector(`[data-tabs-id="${tabsId}"]`)
          if (!container) return
          
          container.querySelectorAll('.detail-tabs__tab').forEach(tab => {
            tab.classList.toggle('is-active', tab.dataset.tab === tabName)
          })
          
          container.querySelectorAll('.detail-panel').forEach(panel => {
            panel.classList.toggle('is-active', panel.dataset.panel === tabName)
          })
        }

        copyRaw(entryId) {
          const entry = this.store.findById(entryId)
          if (entry) {
            this._copyToClipboard(JSON.stringify(entry.toJSON(), null, 2))
          }
        }
      }

      // ============================================
      // Initialize Application
      // ============================================
      window.app = new AIDebugApp()
    </script>
  </body>
</html>
