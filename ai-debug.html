<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI Debug Console</title>
    <!-- 使用 marked 库渲染 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      :root {
        --bg-primary: #0d1117;
        --bg-secondary: #161b22;
        --bg-tertiary: #21262d;
        --border-color: #30363d;
        --text-primary: #c9d1d9;
        --text-secondary: #8b949e;
        --text-muted: #6e7681;
        --accent-blue: #58a6ff;
        --accent-green: #3fb950;
        --accent-yellow: #d29922;
        --accent-red: #f85149;
        --accent-purple: #bc8cff;
        --accent-cyan: #39c5cf;
      }

      body {
        font-family: 'SF Mono', 'Fira Code', 'JetBrains Mono', Consolas, monospace;
        font-size: 13px;
        line-height: 1.5;
        background: var(--bg-primary);
        color: var(--text-primary);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* Header */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 16px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        -webkit-app-region: drag;
      }

      .header h1 {
        font-size: 14px;
        font-weight: 600;
        color: var(--text-primary);
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .header h1::before {
        content: '🔬';
      }

      .header-actions {
        display: flex;
        gap: 8px;
        -webkit-app-region: no-drag;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 6px 12px;
        font-size: 12px;
        font-weight: 500;
        border-radius: 6px;
        border: 1px solid var(--border-color);
        background: var(--bg-tertiary);
        color: var(--text-primary);
        cursor: pointer;
        transition: all 0.15s;
      }

      .btn:hover {
        background: var(--border-color);
        border-color: var(--text-muted);
      }

      .btn.btn-danger {
        background: rgba(248, 81, 73, 0.15);
        border-color: var(--accent-red);
        color: var(--accent-red);
      }

      .btn.btn-danger:hover {
        background: rgba(248, 81, 73, 0.25);
      }

      /* Stats bar */
      .stats-bar {
        display: flex;
        gap: 16px;
        padding: 8px 16px;
        background: var(--bg-secondary);
        border-bottom: 1px solid var(--border-color);
        font-size: 12px;
      }

      .stat-item {
        display: flex;
        align-items: center;
        gap: 6px;
        color: var(--text-secondary);
      }

      .stat-value {
        color: var(--accent-cyan);
        font-weight: 600;
      }

      /* Filter bar */
      .filter-bar {
        display: flex;
        gap: 8px;
        padding: 8px 16px;
        background: var(--bg-tertiary);
        border-bottom: 1px solid var(--border-color);
      }

      .filter-chip {
        padding: 4px 10px;
        font-size: 11px;
        border-radius: 12px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        color: var(--text-secondary);
        cursor: pointer;
        transition: all 0.15s;
      }

      .filter-chip:hover {
        border-color: var(--text-muted);
      }

      .filter-chip.active {
        background: var(--accent-blue);
        border-color: var(--accent-blue);
        color: white;
      }

      /* Main content */
      .main {
        flex: 1;
        display: flex;
        overflow: hidden;
      }

      /* Log list */
      .log-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
      }

      .log-entry {
        margin-bottom: 4px;
        border-radius: 6px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
        overflow: hidden;
        transition: all 0.15s;
      }

      .log-entry:hover {
        border-color: var(--text-muted);
      }

      .log-entry.expanded {
        border-color: var(--accent-blue);
      }

      .log-header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 12px;
        cursor: pointer;
        user-select: none;
      }

      .log-type {
        padding: 2px 8px;
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        border-radius: 4px;
        letter-spacing: 0.5px;
      }

      .log-type.request_start { background: var(--accent-blue); color: white; }
      .log-type.response_chunk { background: var(--accent-green); color: white; }
      .log-type.response_streaming { 
        background: var(--accent-green); 
        color: white; 
        animation: streaming-pulse 1.5s ease-in-out infinite;
      }
      .log-type.response_done { background: var(--accent-cyan); color: var(--bg-primary); }
      .log-type.response_done_tools { background: var(--accent-purple); color: white; }
      .log-type.response_error { background: var(--accent-red); color: white; }
      .log-type.tool_call { background: var(--accent-purple); color: white; }
      .log-type.tool_result { background: var(--accent-yellow); color: var(--bg-primary); }
      
      @keyframes streaming-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.6; }
      }

      .log-time {
        font-size: 11px;
        color: var(--text-muted);
        font-family: monospace;
      }

      .log-summary {
        flex: 1;
        font-size: 12px;
        color: var(--text-secondary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .log-expand {
        color: var(--text-muted);
        font-size: 10px;
        transition: transform 0.2s;
      }

      .log-entry.expanded .log-expand {
        transform: rotate(90deg);
      }

      .log-content {
        display: none;
        padding: 12px;
        border-top: 1px solid var(--border-color);
        background: var(--bg-primary);
      }

      .log-entry.expanded .log-content {
        display: block;
      }

      /* JSON viewer */
      .json-viewer {
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        word-break: break-all;
        max-height: 400px;
        overflow-y: auto;
      }

      .json-key { color: var(--accent-purple); }
      .json-string { color: var(--accent-green); }
      .json-number { color: var(--accent-yellow); }
      .json-boolean { color: var(--accent-blue); }
      .json-null { color: var(--text-muted); }

      /* Messages preview */
      .messages-preview {
        margin-top: 8px;
        padding: 8px;
        background: var(--bg-tertiary);
        border-radius: 4px;
        max-height: 600px;
        overflow-y: auto;
      }

      .message-item {
        margin-bottom: 8px;
        padding: 8px;
        border-radius: 4px;
        background: var(--bg-secondary);
        border-left: 3px solid var(--border-color);
      }

      .message-item.system { border-left-color: var(--accent-purple); }
      .message-item.user { border-left-color: var(--accent-blue); }
      .message-item.assistant { border-left-color: var(--accent-green); }
      .message-item.tool { border-left-color: var(--accent-yellow); }

      .message-role {
        font-size: 10px;
        font-weight: 600;
        text-transform: uppercase;
        color: var(--text-muted);
        margin-bottom: 4px;
      }

      .message-content {
        font-size: 12px;
        color: var(--text-secondary);
        white-space: pre-wrap;
        word-break: break-all;
      }

      /* Empty state */
      .empty-state {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100%;
        color: var(--text-muted);
        text-align: center;
        padding: 40px;
      }

      .empty-state-icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.5;
      }

      .empty-state-title {
        font-size: 16px;
        font-weight: 600;
        margin-bottom: 8px;
        color: var(--text-secondary);
      }

      .empty-state-desc {
        font-size: 13px;
        max-width: 300px;
      }

      /* Streaming indicator */
      .streaming-indicator {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 8px;
        background: rgba(63, 185, 80, 0.15);
        border-radius: 4px;
        font-size: 11px;
        color: var(--accent-green);
      }

      .streaming-dot {
        width: 6px;
        height: 6px;
        background: var(--accent-green);
        border-radius: 50%;
        animation: pulse 1s infinite;
      }

      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      /* Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }

      ::-webkit-scrollbar-track {
        background: var(--bg-primary);
      }

      ::-webkit-scrollbar-thumb {
        background: var(--border-color);
        border-radius: 4px;
      }

      ::-webkit-scrollbar-thumb:hover {
        background: var(--text-muted);
      }

      /* Request ID badge */
      .request-id {
        font-family: monospace;
        font-size: 10px;
        padding: 2px 6px;
        background: var(--bg-tertiary);
        border-radius: 3px;
        color: var(--text-muted);
      }

      /* Auto scroll toggle */
      .auto-scroll-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text-secondary);
      }

      .auto-scroll-toggle input {
        accent-color: var(--accent-blue);
      }

      /* Copy button */
      .btn-copy {
        padding: 4px 8px;
        font-size: 11px;
        background: transparent;
        border: 1px solid var(--border-color);
        color: var(--text-muted);
        cursor: pointer;
        border-radius: 4px;
        opacity: 0;
        transition: all 0.15s;
      }

      .log-header:hover .btn-copy {
        opacity: 1;
      }

      .btn-copy:hover {
        background: var(--bg-tertiary);
        color: var(--text-primary);
        border-color: var(--text-muted);
      }

      .btn-copy.copied {
        color: var(--accent-green);
        border-color: var(--accent-green);
      }

      /* Log file info bar */
      .log-file-bar {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 6px 16px;
        background: var(--bg-tertiary);
        border-bottom: 1px solid var(--border-color);
        font-size: 11px;
        color: var(--text-muted);
      }

      .log-file-path {
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-family: monospace;
      }

      .log-file-bar .btn {
        padding: 3px 8px;
        font-size: 11px;
      }

      /* Toast notification */
      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        padding: 10px 20px;
        background: var(--bg-tertiary);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        color: var(--text-primary);
        font-size: 13px;
        z-index: 1000;
        opacity: 0;
        transition: opacity 0.3s;
        pointer-events: none;
      }

      .toast.show {
        opacity: 1;
      }

      .toast.success {
        border-color: var(--accent-green);
        color: var(--accent-green);
      }

      /* Allow text selection */
      .log-content, .json-viewer, .message-content, .log-summary {
        user-select: text;
        -webkit-user-select: text;
      }

      /* Markdown 渲染样式 */
      .markdown-content {
        font-size: 12px;
        line-height: 1.6;
        color: var(--text-secondary);
      }

      .markdown-content h1, .markdown-content h2, .markdown-content h3 {
        color: var(--text-primary);
        margin: 0.8em 0 0.4em 0;
        font-weight: 600;
      }

      .markdown-content h1 { font-size: 1.3em; border-bottom: 1px solid var(--border-color); padding-bottom: 0.3em; }
      .markdown-content h2 { font-size: 1.15em; }
      .markdown-content h3 { font-size: 1em; }

      .markdown-content p {
        margin: 0.5em 0;
      }

      .markdown-content ul, .markdown-content ol {
        margin: 0.5em 0;
        padding-left: 1.5em;
      }

      .markdown-content li {
        margin: 0.2em 0;
      }

      .markdown-content code {
        background: var(--bg-tertiary);
        padding: 0.15em 0.4em;
        border-radius: 3px;
        font-family: 'SF Mono', 'Fira Code', monospace;
        font-size: 0.9em;
        color: var(--accent-cyan);
      }

      .markdown-content pre {
        background: var(--bg-tertiary);
        padding: 0.8em;
        border-radius: 4px;
        overflow-x: auto;
        margin: 0.5em 0;
      }

      .markdown-content pre code {
        background: none;
        padding: 0;
        color: var(--text-primary);
      }

      .markdown-content table {
        border-collapse: collapse;
        width: 100%;
        margin: 0.5em 0;
        font-size: 11px;
      }

      .markdown-content th, .markdown-content td {
        border: 1px solid var(--border-color);
        padding: 0.4em 0.6em;
        text-align: left;
      }

      .markdown-content th {
        background: var(--bg-tertiary);
        color: var(--text-primary);
        font-weight: 600;
      }

      .markdown-content strong {
        color: var(--text-primary);
        font-weight: 600;
      }

      .markdown-content em {
        font-style: italic;
      }

      .markdown-content blockquote {
        border-left: 3px solid var(--accent-blue);
        padding-left: 1em;
        margin: 0.5em 0;
        color: var(--text-muted);
      }

      .markdown-content hr {
        border: none;
        border-top: 1px solid var(--border-color);
        margin: 1em 0;
      }

      /* 渲染模式切换 */
      .render-toggle {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        color: var(--text-muted);
        padding: 4px 8px;
        background: var(--bg-tertiary);
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s;
      }

      .render-toggle:hover {
        color: var(--text-secondary);
      }

      .render-toggle.active {
        color: var(--accent-blue);
        background: rgba(88, 166, 255, 0.1);
      }

      /* 渲染失败提示 */
      .render-fallback {
        padding: 8px;
        background: rgba(248, 81, 73, 0.1);
        border-left: 3px solid var(--accent-red);
        font-size: 11px;
        color: var(--accent-red);
        margin-bottom: 8px;
      }

      /* 可折叠区块样式 */
      .collapsible-section {
        margin-top: 8px;
        cursor: pointer;
      }

      .collapsible-header {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 6px 8px;
        background: var(--bg-tertiary);
        border-radius: 4px;
        font-size: 12px;
        color: var(--text-secondary);
      }

      .collapsible-header:hover {
        background: var(--border-color);
      }

      .collapse-icon {
        font-size: 10px;
        transition: transform 0.2s;
        color: var(--text-muted);
      }

      .collapsible-section:not(.collapsed) .collapse-icon,
      .collapsible-message:not(.collapsed) .collapse-icon {
        transform: rotate(90deg);
      }

      .collapsible-section.collapsed .collapsible-content {
        display: none;
      }

      .tool-summary {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      /* 可折叠消息样式 */
      .collapsible-message {
        cursor: pointer;
      }

      .collapsible-message .message-role {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .message-preview {
        font-size: 11px;
        color: var(--text-muted);
        padding: 4px 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .collapsible-message.collapsed .message-full-content {
        display: none;
      }

      .collapsible-message:not(.collapsed) .message-preview {
        display: none;
      }

      /* 减小 tools 的 json-viewer 高度 */
      .collapsible-content .json-viewer {
        max-height: 250px;
      }

      /* 工具调用显示样式 */
      .tool-calls-container {
        margin-top: 4px;
      }

      .tool-call-item {
        display: flex;
        flex-direction: column;
        gap: 4px;
        padding: 8px 10px;
        background: rgba(188, 140, 255, 0.08);
        border-radius: 6px;
        margin-bottom: 6px;
        border-left: 3px solid var(--accent-purple);
      }

      .tool-call-header {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .tool-call-icon {
        font-size: 12px;
      }

      .tool-call-name {
        font-weight: 600;
        color: var(--accent-purple);
        font-size: 12px;
      }

      .tool-call-body {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-left: 4px;
      }

      .tool-call-section {
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .tool-section-label {
        font-size: 10px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 0.3px;
      }

      .tool-call-args {
        font-size: 11px;
        color: var(--text-secondary);
        margin: 0;
        padding: 6px 8px;
        background: var(--bg-primary);
        border-radius: 4px;
        overflow-x: auto;
        max-height: 80px;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .tool-result-section {
        border-top: 1px dashed var(--border-color);
        padding-top: 6px;
        margin-top: 2px;
      }

      .tool-call-result {
        font-size: 11px;
        color: var(--accent-green);
        margin: 0;
        padding: 6px 8px;
        background: rgba(63, 185, 80, 0.1);
        border-radius: 4px;
        overflow-x: auto;
        max-height: 120px;
        white-space: pre-wrap;
        word-break: break-all;
      }

      .tool-pending {
        font-size: 11px;
        color: var(--text-muted);
        font-style: italic;
      }

      /* 历史消息摘要样式 */
      .history-summary {
        margin-bottom: 8px;
        border-radius: 6px;
        background: var(--bg-secondary);
        border: 1px solid var(--border-color);
      }

      .history-summary .collapsible-header {
        padding: 8px 10px;
        gap: 8px;
      }

      .history-label {
        font-size: 12px;
        color: var(--text-secondary);
        font-weight: 500;
      }

      .history-stats {
        display: flex;
        gap: 6px;
        margin-left: auto;
      }

      .hist-badge {
        font-size: 10px;
        padding: 2px 6px;
        border-radius: 10px;
        background: var(--bg-tertiary);
        color: var(--text-muted);
      }

      .hist-badge.system { color: var(--accent-purple); }
      .hist-badge.user { color: var(--accent-blue); }
      .hist-badge.assistant { color: var(--accent-green); }
      .hist-badge.tool { color: var(--accent-yellow); }

      .history-content {
        max-height: 300px;
        overflow-y: auto;
        padding: 8px;
        border-top: 1px solid var(--border-color);
      }

      .hist-message {
        display: flex;
        align-items: flex-start;
        gap: 8px;
        padding: 4px 6px;
        font-size: 11px;
        border-radius: 3px;
        margin-bottom: 2px;
      }

      .hist-message:hover {
        background: var(--bg-tertiary);
      }

      .hist-role {
        font-size: 9px;
        font-weight: 600;
        text-transform: uppercase;
        padding: 2px 5px;
        border-radius: 3px;
        background: var(--bg-tertiary);
        color: var(--text-muted);
        flex-shrink: 0;
        min-width: 55px;
        text-align: center;
      }

      .hist-message.system .hist-role { color: var(--accent-purple); }
      .hist-message.user .hist-role { color: var(--accent-blue); }
      .hist-message.assistant .hist-role { color: var(--accent-green); }
      .hist-message.tool .hist-role { color: var(--accent-yellow); }

      .hist-tools {
        font-size: 10px;
        color: var(--accent-purple);
        flex-shrink: 0;
      }

      .hist-content {
        color: var(--text-muted);
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        flex: 1;
      }

      /* 历史消息可折叠样式 */
      .hist-collapsible {
        flex-direction: column;
        align-items: stretch;
        cursor: pointer;
        padding: 6px 8px;
        background: var(--bg-secondary);
        border-radius: 4px;
      }

      .hist-header {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .hist-header .collapse-icon {
        margin-left: auto;
      }

      .hist-preview {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 4px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .hist-collapsible.collapsed .hist-full {
        display: none;
      }

      .hist-collapsible:not(.collapsed) .hist-preview {
        display: none;
      }

      .hist-collapsible:not(.collapsed) .collapse-icon {
        transform: rotate(90deg);
      }

      .hist-full {
        margin-top: 8px;
        padding-top: 8px;
        border-top: 1px solid var(--border-color);
      }

      .hist-full-content {
        margin: 0;
        font-size: 11px;
        color: var(--text-secondary);
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 200px;
        overflow-y: auto;
        line-height: 1.5;
      }

      /* 当前用户输入高亮 */
      .current-user {
        border-left-width: 4px;
        background: rgba(88, 166, 255, 0.1);
      }

      .current-badge {
        font-size: 11px;
        color: var(--accent-blue);
        font-weight: 600;

      .tool-result-content {

      /* 详情标签页样式 */
      .detail-tabs {
        display: flex;
        gap: 0;
        border-bottom: 1px solid var(--border-color);
        margin-bottom: 12px;
      }

      .detail-tab {
        padding: 8px 16px;
        font-size: 12px;
        color: var(--text-muted);
        cursor: pointer;
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        user-select: none;
      }

      .detail-tab:hover {
        color: var(--text-secondary);

      }

      .detail-tab.active {

        margin: 0;

      /* 复制按钮样式 */
      .copy-raw-btn {
        display: inline-flex;

      /* 搜索高亮 */

    </style>
  </head>
  <body>
    <div class="header">
      <h1>AI Debug Console</h1>
      <div class="header-actions">
        <label class="auto-scroll-toggle">
          <input type="checkbox" id="autoScroll" checked />

        <span class="render-toggle" id="markdownToggle" onclick="toggleMarkdown()" title="切换 Markdown 渲染">

        </span>
        <button class="btn" onclick="copyAllLogs()">

        </button>
        <button class="btn" onclick="openLogDir()">

        </button>

    <div class="log-file-bar">

      <button class="btn" onclick="copyLogFilePath()">复制路径</button>
    </div>

    <div class="stats-bar">
      <div class="stat-item">
        请求: <span class="stat-value" id="requestCount">0</span>
      </div>
      <div class="stat-item">
        工具调用: <span class="stat-value" id="toolCallCount">0</span>
      </div>
      <div class="stat-item">
        错误: <span class="stat-value" id="errorCount">0</span>
      </div>
      <div class="stat-item" id="streamingStatus" style="display: none;">
        <span class="streaming-indicator">
          <span class="streaming-dot"></span>
          流式传输中
        </span>
      </div>
    </div>

    <div class="filter-bar">
      <span class="filter-chip active" data-filter="all">全部</span>
      <span class="filter-chip" data-filter="request_start">请求</span>
      <span class="filter-chip" data-filter="response_chunk">响应流</span>
      <span class="filter-chip" data-filter="response_done">完成</span>
      <span class="filter-chip" data-filter="response_error">错误</span>
      <span class="filter-chip" data-filter="tool_call">工具调用</span>
      <span class="filter-chip" data-filter="tool_result">工具结果</span>
      <div class="filter-spacer"></div>
      <div class="search-box">
        <span class="search-icon">🔍</span>
        <input type="text" id="searchInput" placeholder="搜索日志内容..." oninput="handleSearch(this.value)">
        <span class="search-clear" id="searchClear" onclick="clearSearch()" style="display: none;">✕</span>
      </div>
    </div>

    <div class="main">
      <div class="log-list" id="logList">
        <div class="empty-state" id="emptyState">
          <div class="empty-state-icon">📡</div>
          <div class="empty-state-title">等待 AI 请求...</div>
          <div class="empty-state-desc">
            当应用发送 AI 请求时，这里会显示实时的请求和响应流水。
          </div>
        </div>
      </div>
    </div>

    <script>
      // 日志数据
      let logs = []
      let currentFilter = 'all'
      let autoScroll = true
      let markdownEnabled = true  // Markdown 渲染开关
      let searchQuery = ''  // 搜索关键词
      let stats = {
        requests: 0,
        toolCalls: 0,
        errors: 0
      }
      
      // AI 思考内容缓存：requestId -> { content, chunks, duration }
      let aiThinkingCache = new Map()

      // 切换 Markdown 渲染
      function toggleMarkdown() {
        markdownEnabled = !markdownEnabled
        const toggle = document.getElementById('markdownToggle')
        toggle.classList.toggle('active', markdownEnabled)
        renderLogs()  // 重新渲染
      }

      // HTML 转义函数
      function escapeHtml(text) {
        if (!text) return ''
        return text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
      }

      // 简单的 Markdown 渲染器（fallback）
      function simpleMarkdown(text) {
        let html = escapeHtml(text)
        
        // 代码块
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
        // 行内代码
        html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>')
        // 标题
        html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>')
        html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>')
        html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>')
        // 粗体
        html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        // 列表
        html = html.replace(/^- (.+)$/gm, '<li>$1</li>')
        html = html.replace(/(<li>.*<\/li>\n?)+/g, '<ul>$&</ul>')
        // 分隔线
        html = html.replace(/^---+$/gm, '<hr>')
        // 换行
        html = html.replace(/\n/g, '<br>')
        
        return html
      }

      // 使用 marked 库渲染 Markdown（带 fallback）
      function renderMarkdown(text) {
        if (!text || !markdownEnabled) {
          return escapeHtml(text || '')
        }

        try {
          // 检查 marked 是否已加载
          if (typeof marked === 'undefined') {
            console.warn('marked 库未加载，使用简单渲染器')
            return simpleMarkdown(text)
          }

          // 配置 marked（与项目中 useMarkdown.ts 保持一致）
          marked.setOptions({
            breaks: true,  // 支持换行
            gfm: true      // 支持 GitHub 风格 Markdown
          })

          return marked.parse(text)
        } catch (e) {
          console.error('Markdown render error:', e)
          // 渲染失败时使用简单渲染器
          return simpleMarkdown(text)
        }
      }
      let activeRequests = new Set()
      
      // 聚合响应流：requestId -> { id, chunks: string[], startTime, lastTime }
      let streamingResponses = new Map()

      // DOM 元素
      const logList = document.getElementById('logList')
      const emptyState = document.getElementById('emptyState')
      const requestCountEl = document.getElementById('requestCount')
      const toolCallCountEl = document.getElementById('toolCallCount')
      const errorCountEl = document.getElementById('errorCount')
      const streamingStatus = document.getElementById('streamingStatus')
      const autoScrollCheckbox = document.getElementById('autoScroll')

      // 初始化
      autoScrollCheckbox.addEventListener('change', (e) => {
        autoScroll = e.target.checked
      })

      // 初始化 Markdown 切换按钮状态
      document.getElementById('markdownToggle').classList.toggle('active', markdownEnabled)

      // 过滤器点击
      document.querySelectorAll('.filter-chip').forEach(chip => {
        chip.addEventListener('click', () => {
          document.querySelector('.filter-chip.active').classList.remove('active')
          chip.classList.add('active')
          currentFilter = chip.dataset.filter
          renderLogs()
        })
      })

      // 格式化时间
      function formatTime(timestamp) {
        const date = new Date(timestamp)
        return date.toLocaleTimeString('zh-CN', {
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          fractionalSecondDigits: 3
        })
      }

      // 获取日志摘要
      function getLogSummary(entry) {
        switch (entry.type) {
          case 'request_start':
            const msgCount = entry.data.messages?.length || 0
            const toolCount = entry.data.tools?.length || 0
            return `${entry.model || 'Unknown'} | ${msgCount} 条消息 | ${toolCount} 个工具`
          case 'response_chunk':
            return entry.data.chunk?.substring(0, 100) || ''
          case 'response_streaming':
            // 聚合的流式响应
            const content = entry.data.content || ''
            const chunkCount = entry.data.chunkCount || 0
            const preview = content.length > 80 ? content.substring(0, 80) + '...' : content
            return `${preview} (${chunkCount} chunks)`
          case 'response_done':
            return `完成 (${entry.data.finishReason || 'unknown'})`
          case 'response_error':
            return entry.data.error || '未知错误'
          case 'tool_call':
            return `${entry.data.toolCall?.name || 'unknown'}()`
          case 'tool_result':
            const status = entry.data.toolResult?.success ? '✓' : '✗'
            return `${status} ${entry.data.toolResult?.result?.substring(0, 80) || ''}`
          default:
            return ''
        }
      }

      // 格式化 JSON
      function formatJson(obj, indent = 0) {
        if (obj === null) return '<span class="json-null">null</span>'
        if (obj === undefined) return '<span class="json-null">undefined</span>'
        
        const type = typeof obj
        
        if (type === 'string') {
          // 转义 HTML
          const escaped = obj.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          return `<span class="json-string">"${escaped}"</span>`
        }
        if (type === 'number') return `<span class="json-number">${obj}</span>`
        if (type === 'boolean') return `<span class="json-boolean">${obj}</span>`
        
        if (Array.isArray(obj)) {
          if (obj.length === 0) return '[]'
          const items = obj.map(item => '  '.repeat(indent + 1) + formatJson(item, indent + 1))
          return `[\n${items.join(',\n')}\n${'  '.repeat(indent)}]`
        }
        
        if (type === 'object') {
          const keys = Object.keys(obj)
          if (keys.length === 0) return '{}'
          const items = keys.map(key => {
            const escapedKey = key.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            return `${'  '.repeat(indent + 1)}<span class="json-key">"${escapedKey}"</span>: ${formatJson(obj[key], indent + 1)}`
          })
          return `{\n${items.join(',\n')}\n${'  '.repeat(indent)}}`
        }
        
        return String(obj)
      }

      // 渲染消息列表 - 只显示最新的 user 消息，历史用摘要代替
      function renderMessages(messages) {
        if (!messages || messages.length === 0) return ''
        
        // 找到最后一个 user 消息的索引
        let lastUserIndex = -1
        for (let i = messages.length - 1; i >= 0; i--) {
          if (messages[i].role === 'user') {
            lastUserIndex = i
            break
          }
        }
        
        // 检测是否是工具循环请求：user 消息之后有 tool 消息
        const messagesAfterUser = lastUserIndex >= 0 ? messages.slice(lastUserIndex + 1) : []
        const hasToolResults = messagesAfterUser.some(m => m.role === 'tool')
        
        // 获取最新的 tool 结果（如果有）
        const latestToolResults = messagesAfterUser.filter(m => m.role === 'tool')
        
        // 统计历史消息（user 消息之前的所有消息）
        const historyMessages = lastUserIndex > 0 ? messages.slice(0, lastUserIndex) : []
        const systemCount = historyMessages.filter(m => m.role === 'system').length
        const userCount = historyMessages.filter(m => m.role === 'user').length
        const assistantCount = historyMessages.filter(m => m.role === 'assistant').length
        const toolCount = historyMessages.filter(m => m.role === 'tool').length
        const hasHistory = historyMessages.length > 0
        
        // 最新的 user 消息
        const latestUserMsg = lastUserIndex >= 0 ? messages[lastUserIndex] : null
        
        let html = '<div class="messages-preview">'
        
        // 显示历史摘要（可展开）
        if (hasHistory) {
          html += `
            <div class="history-summary collapsible-section collapsed" onclick="event.stopPropagation(); this.classList.toggle('collapsed')">
              <div class="collapsible-header">
                <span class="collapse-icon">▶</span>
                <span class="history-label">📜 历史上下文</span>
                <span class="history-stats">
                  ${systemCount > 0 ? `<span class="hist-badge system">${systemCount} system</span>` : ''}
                  ${userCount > 0 ? `<span class="hist-badge user">${userCount} user</span>` : ''}
                  ${assistantCount > 0 ? `<span class="hist-badge assistant">${assistantCount} assistant</span>` : ''}
                  ${toolCount > 0 ? `<span class="hist-badge tool">${toolCount} tool</span>` : ''}
                </span>
              </div>
              <div class="collapsible-content history-content">
                ${renderHistoryMessages(historyMessages)}
              </div>
            </div>
          `
        }
        
        // 根据是否是工具循环请求显示不同内容
        if (hasToolResults) {
          // 工具循环请求：显示完整工具结果（长内容可折叠）
          const toolResultsHtml = latestToolResults.map((t, idx) => {
            const content = t.content || ''
            const isLong = content.length > 200
            const preview = content.substring(0, 150).replace(/\n/g, ' ')
            
            if (isLong) {
              return `
                <div class="tool-result-item collapsible-result collapsed" onclick="event.stopPropagation(); this.classList.toggle('collapsed')">
                  <div class="tool-result-header">
                    <span class="collapse-icon">▶</span>
                    <span class="tool-result-preview">${escapeHtml(preview)}...</span>
                  </div>
                  <div class="tool-result-full">
                    <pre class="tool-result-content">${escapeHtml(content)}</pre>
                  </div>
                </div>
              `
            } else {
              return `<div class="tool-result-item"><pre class="tool-result-content">${escapeHtml(content)}</pre></div>`
            }
          }).join('')
          
          html += `
            <div class="message-item tool current-tool-result">
              <div class="message-role">
                <span class="current-badge tool-badge">🔄 工具结果返回 (${latestToolResults.length})</span>
              </div>
              <div class="tool-results-preview">${toolResultsHtml}</div>
            </div>
          `
        } else if (latestUserMsg) {
          // 普通请求：显示用户输入
          const content = latestUserMsg.content || ''
          html += `
            <div class="message-item user current-user">
              <div class="message-role">
                <span class="current-badge">✨ 本次输入</span>
              </div>
              <div class="message-content">${escapeHtml(content)}</div>
            </div>
          `
        }
        
        html += '</div>'
        return html
      }
      
      // 渲染历史消息（简化版）
      function renderHistoryMessages(messages) {
        return messages.map(msg => {
          let content = msg.content || ''
          let extraInfo = ''
          
          // Assistant 工具调用显示工具名称
          if (msg.role === 'assistant' && msg.tool_calls && msg.tool_calls.length > 0) {
            const toolNames = msg.tool_calls.map(tc => tc.function?.name || 'unknown').join(', ')
            extraInfo = `<span class="hist-tools">🔧 ${toolNames}</span>`
            if (!content) content = '[工具调用]'
          }
          
          const isLong = content.length > 150
          const preview = content.substring(0, 120).replace(/\n/g, ' ')
          
          if (isLong) {
            return `
              <div class="hist-message ${msg.role} hist-collapsible collapsed" onclick="event.stopPropagation(); this.classList.toggle('collapsed')">
                <div class="hist-header">
                  <span class="hist-role">${msg.role}</span>
                  ${extraInfo}
                  <span class="collapse-icon">▶</span>
                </div>
                <div class="hist-preview">${escapeHtml(preview)}...</div>
                <div class="hist-full">
                  <pre class="hist-full-content">${escapeHtml(content)}</pre>
                </div>
              </div>
            `
          } else {
            return `
              <div class="hist-message ${msg.role}">
                <span class="hist-role">${msg.role}</span>
                ${extraInfo}
                <span class="hist-content">${escapeHtml(content.replace(/\n/g, ' '))}</span>
              </div>
            `
          }
        }).join('')
      }

      // 生成唯一 ID
      function generateTabId() {
        return 'tab_' + Math.random().toString(36).substr(2, 9)
      }

      // 切换标签页
      function switchTab(tabsId, tabName) {
        const container = document.querySelector(`[data-tabs-id="${tabsId}"]`)
        if (!container) return
        
        // 切换标签按钮
        container.querySelectorAll('.detail-tab').forEach(tab => {
          tab.classList.toggle('active', tab.dataset.tab === tabName)
        })
        
        // 切换面板
        container.querySelectorAll('.detail-panel').forEach(panel => {
          panel.classList.toggle('active', panel.dataset.panel === tabName)
        })
      }

      // 复制原始数据
      async function copyRawData(entryId) {
        const entry = logs.find(e => e.id === entryId)
        if (entry) {
          const text = JSON.stringify(entry, null, 2)
          if (await copyToClipboard(text)) {
            const btn = document.querySelector(`[data-copy-id="${entryId}"]`)
            if (btn) {
              btn.classList.add('copied')
              btn.textContent = '✓ 已复制'
              setTimeout(() => {
                btn.classList.remove('copied')
                btn.textContent = '📋 复制 JSON'
              }, 2000)
            }
          }
        }
      }

      // 渲染日志内容（带标签页）
      function renderLogContent(entry) {
        const tabsId = generateTabId()
        let summaryContent = ''
        let rawJson = JSON.stringify(entry, null, 2)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
        
        if (entry.type === 'request_start') {
          // 摘要内容
          if (entry.data.messages) {
            summaryContent += '<strong>Messages:</strong>' + renderMessages(entry.data.messages)
          }
          if (entry.data.tools && entry.data.tools.length > 0) {
            const toolNames = entry.data.tools.map(t => t.function?.name || t).join(', ')
            summaryContent += `
              <br><strong>Tools:</strong>
              <div class="collapsible-section collapsed" onclick="event.stopPropagation(); this.classList.toggle('collapsed')">
                <div class="collapsible-header">
                  <span class="collapse-icon">▶</span>
                  <span class="tool-summary">${entry.data.tools.length} 个工具: ${toolNames}</span>
                </div>
                <div class="collapsible-content">
                  <div class="json-viewer">${formatJson(entry.data.tools)}</div>
                </div>
              </div>
            `
          }
          
          return `
            <div data-tabs-id="${tabsId}">
              <div class="detail-tabs">
                <div class="detail-tab active" data-tab="summary" onclick="switchTab('${tabsId}', 'summary')">📋 摘要</div>
                <div class="detail-tab" data-tab="raw" onclick="switchTab('${tabsId}', 'raw')">{ } 原始数据</div>
              </div>
              <div class="detail-panel active" data-panel="summary">${summaryContent}</div>
              <div class="detail-panel" data-panel="raw">
                <button class="copy-raw-btn" data-copy-id="${entry.id}" onclick="event.stopPropagation(); copyRawData('${entry.id}')">📋 复制 JSON</button>
                <div class="raw-json"><pre>${rawJson}</pre></div>
              </div>
            </div>
          `
        } else if (entry.type === 'response_streaming') {
          // 流式响应
          const escaped = (entry.data.content || '')
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
          summaryContent = `
            <div style="margin-bottom: 8px; font-size: 11px; color: var(--text-muted);">
              已接收 ${entry.data.chunkCount} 个 chunks
            </div>
            <div class="json-viewer" style="white-space: pre-wrap;">${escaped}</div>
          `
          
          return `
            <div data-tabs-id="${tabsId}">
              <div class="detail-tabs">
                <div class="detail-tab active" data-tab="summary" onclick="switchTab('${tabsId}', 'summary')">📋 内容</div>
                <div class="detail-tab" data-tab="raw" onclick="switchTab('${tabsId}', 'raw')">{ } 原始数据</div>
              </div>
              <div class="detail-panel active" data-panel="summary">${summaryContent}</div>
              <div class="detail-panel" data-panel="raw">
                <button class="copy-raw-btn" data-copy-id="${entry.id}" onclick="event.stopPropagation(); copyRawData('${entry.id}')">📋 复制 JSON</button>
                <div class="raw-json"><pre>${rawJson}</pre></div>
              </div>
            </div>
          `
        } else if (entry.type === 'response_done') {
          const duration = entry.data.streamDuration ? ` (${entry.data.streamDuration}ms)` : ''
          const chunks = entry.data.chunkCount ? ` | ${entry.data.chunkCount} chunks` : ''
          
          // 区分工具调用和真正完成
          if (entry.data.finishReason === 'tool_calls') {
            // 这种情况现在不会显示（已被合并到 tool_call）
            return ''
          } else {
            // 真正完成 - 显示完整内容
            const escaped = (entry.data.response || '')
              .replace(/&/g, '&amp;')
              .replace(/</g, '&lt;')
              .replace(/>/g, '&gt;')
            summaryContent = `
              <div style="margin-bottom: 8px; font-size: 11px; color: var(--text-muted);">
                完成原因: ${entry.data.finishReason || 'unknown'}${chunks}${duration}
              </div>
              ${escaped ? `<div class="json-viewer" style="white-space: pre-wrap;">${escaped}</div>` : ''}
              ${entry.data.usage ? `<div style="margin-top: 8px; font-size: 11px; color: var(--text-muted);">Token 用量: ${JSON.stringify(entry.data.usage)}</div>` : ''}
            `
          }
          
          return `
            <div data-tabs-id="${tabsId}">
              <div class="detail-tabs">
                <div class="detail-tab active" data-tab="summary" onclick="switchTab('${tabsId}', 'summary')">📋 响应</div>
                <div class="detail-tab" data-tab="raw" onclick="switchTab('${tabsId}', 'raw')">{ } 原始数据</div>
              </div>
              <div class="detail-panel active" data-panel="summary">${summaryContent}</div>
              <div class="detail-panel" data-panel="raw">
                <button class="copy-raw-btn" data-copy-id="${entry.id}" onclick="event.stopPropagation(); copyRawData('${entry.id}')">📋 复制 JSON</button>
                <div class="raw-json"><pre>${rawJson}</pre></div>
              </div>
            </div>
          `
        } else if (entry.type === 'tool_call') {
          // 工具调用 - 检查是否有 AI 思考内容
          const thinking = aiThinkingCache.get(entry.requestId)
          let thinkingHtml = ''
          if (thinking && thinking.content) {
            thinkingHtml = `
              <div class="ai-thinking-section">
                <div class="ai-thinking-header">💭 AI 思考</div>
                <div class="ai-thinking-content">${escapeHtml(thinking.content)}</div>
                <div class="ai-thinking-meta">${thinking.chunks} chunks | ${thinking.duration}ms</div>
              </div>
            `
          }
          summaryContent = thinkingHtml + '<div class="json-viewer">' + formatJson(entry.data) + '</div>'
          
          return `
            <div data-tabs-id="${tabsId}">
              <div class="detail-tabs">
                <div class="detail-tab active" data-tab="summary" onclick="switchTab('${tabsId}', 'summary')">📋 摘要</div>
                <div class="detail-tab" data-tab="raw" onclick="switchTab('${tabsId}', 'raw')">{ } 原始数据</div>
              </div>
              <div class="detail-panel active" data-panel="summary">${summaryContent}</div>
              <div class="detail-panel" data-panel="raw">
                <button class="copy-raw-btn" data-copy-id="${entry.id}" onclick="event.stopPropagation(); copyRawData('${entry.id}')">📋 复制 JSON</button>
                <div class="raw-json"><pre>${rawJson}</pre></div>
              </div>
            </div>
          `
        } else if (entry.type === 'tool_result') {
          // 工具结果
          const success = entry.data.toolResult?.success
          const result = entry.data.toolResult?.result || ''
          const error = entry.data.toolResult?.error || ''
          
          summaryContent = `
            <div style="margin-bottom: 8px;">
              <span style="color: ${success ? 'var(--accent-green)' : 'var(--accent-red)'}">
                ${success ? '✓ 执行成功' : '✗ 执行失败'}
              </span>
            </div>
            ${result ? `<div class="json-viewer" style="white-space: pre-wrap;">${escapeHtml(result)}</div>` : ''}
            ${error ? `<div style="color: var(--accent-red); margin-top: 8px;">${escapeHtml(error)}</div>` : ''}
          `
          
          return `
            <div data-tabs-id="${tabsId}">
              <div class="detail-tabs">
                <div class="detail-tab active" data-tab="summary" onclick="switchTab('${tabsId}', 'summary')">📋 结果</div>
                <div class="detail-tab" data-tab="raw" onclick="switchTab('${tabsId}', 'raw')">{ } 原始数据</div>
              </div>
              <div class="detail-panel active" data-panel="summary">${summaryContent}</div>
              <div class="detail-panel" data-panel="raw">
                <button class="copy-raw-btn" data-copy-id="${entry.id}" onclick="event.stopPropagation(); copyRawData('${entry.id}')">📋 复制 JSON</button>
                <div class="raw-json"><pre>${rawJson}</pre></div>
              </div>
            </div>
          `
        } else {
          // 其他类型
          return `
            <div data-tabs-id="${tabsId}">
              <div class="detail-tabs">
                <div class="detail-tab active" data-tab="raw" onclick="switchTab('${tabsId}', 'raw')">{ } 原始数据</div>
              </div>
              <div class="detail-panel active" data-panel="raw">
                <button class="copy-raw-btn" data-copy-id="${entry.id}" onclick="event.stopPropagation(); copyRawData('${entry.id}')">📋 复制 JSON</button>
                <div class="raw-json"><pre>${rawJson}</pre></div>
              </div>
            </div>
          `
        }
      }

      // 创建日志条目元素
      function createLogElement(entry) {
        const div = document.createElement('div')
        div.className = 'log-entry'
        div.dataset.id = entry.id
        div.dataset.type = entry.type
        if (entry.requestId) {
          div.dataset.requestId = entry.requestId
        }
        
        // 安全地截取 requestId
        const requestIdDisplay = entry.requestId 
          ? (entry.requestId.length > 12 ? entry.requestId.substring(0, 12) + '...' : entry.requestId)
          : 'unknown'
        
        // 转义 log-summary 中的 HTML 特殊字符，防止 XSS
        const summary = getLogSummary(entry)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
        
        // 友好的类型名称
          let typeLabel = {
            'request_start': 'REQUEST',
            'response_streaming': 'STREAMING',
            'response_chunk': 'CHUNK',
            'response_done': 'DONE',
            'response_error': 'ERROR',
            'tool_call': 'TOOL CALL',
            'tool_result': 'TOOL RESULT'
          }[entry.type] || entry.type.replace('_', ' ')
          
          // 区分真正完成和等待工具调用
          let typeClass = entry.type
          if (entry.type === 'response_done') {
            if (entry.data?.finishReason === 'tool_calls') {
              typeLabel = '→ TOOLS'
              typeClass = 'response_done_tools'
            } else {
              typeLabel = '✓ DONE'
            }
          }
          
          div.innerHTML = `
            <div class="log-header">
              <span class="log-type ${typeClass}">${typeLabel}</span>
            <span class="log-time">${formatTime(entry.timestamp)}</span>
            <span class="request-id">${requestIdDisplay}</span>
            <span class="log-summary">${summary}</span>
            <button class="btn-copy" onclick="event.stopPropagation(); copyEntry('${entry.id}')">📋 复制</button>
            <span class="log-expand">▶</span>
          </div>
          <div class="log-content">
            ${renderLogContent(entry)}
          </div>
        `
        
        // 点击展开/折叠（排除复制按钮）
        div.querySelector('.log-header').addEventListener('click', (e) => {
          if (!e.target.classList.contains('btn-copy')) {
            div.classList.toggle('expanded')
          }
        })
        
        return div
      }

      // 搜索处理
      function handleSearch(query) {
        searchQuery = query.trim().toLowerCase()
        const clearBtn = document.getElementById('searchClear')
        clearBtn.style.display = searchQuery ? 'block' : 'none'
        renderLogs()
      }

      // 清除搜索
      function clearSearch() {
        searchQuery = ''
        document.getElementById('searchInput').value = ''
        document.getElementById('searchClear').style.display = 'none'
        renderLogs()
      }

      // 检查日志条目是否匹配搜索
      function matchesSearch(entry, query) {
        if (!query) return true
        
        // 搜索 JSON 字符串
        const jsonStr = JSON.stringify(entry).toLowerCase()
        return jsonStr.includes(query)
      }

      // 渲染日志列表
      function renderLogs() {
        let filtered
        if (currentFilter === 'all') {
          filtered = logs
        } else if (currentFilter === 'response_chunk') {
          // 响应流过滤器同时匹配 response_chunk 和 response_streaming
          filtered = logs.filter(l => l.type === 'response_chunk' || l.type === 'response_streaming')
        } else {
          filtered = logs.filter(l => l.type === currentFilter)
        }
        
        // 应用搜索过滤
        if (searchQuery) {
          filtered = filtered.filter(entry => matchesSearch(entry, searchQuery))
        }
        
        // 清空并重新渲染
        logList.innerHTML = ''
        
        if (filtered.length === 0) {
          if (searchQuery) {
            logList.innerHTML = `
              <div class="empty-state">
                <div class="empty-state-icon">🔍</div>
                <div class="empty-state-title">未找到匹配结果</div>
                <div class="empty-state-desc">没有找到包含 "${escapeHtml(searchQuery)}" 的日志</div>
              </div>
            `
          } else {
            logList.appendChild(emptyState.cloneNode(true))
          }
          return
        }
        
        filtered.forEach(entry => {
          logList.appendChild(createLogElement(entry))
        })
        
        if (autoScroll) {
          logList.scrollTop = logList.scrollHeight
        }
      }

      // 添加日志
      function addLog(entry) {
        // 特殊处理 response_chunk：聚合成 response_streaming
        if (entry.type === 'response_chunk') {
          handleResponseChunk(entry)
          return
        }
        
        // 如果是 response_done，完成对应的 streaming
        if (entry.type === 'response_done' || entry.type === 'response_error') {
          finalizeStreaming(entry.requestId, entry)
        }
        
        // 特殊处理 response_done (tool_calls)：存入缓存，更新 TOOL CALL，不单独显示
        if (entry.type === 'response_done' && entry.data?.finishReason === 'tool_calls') {
          // 存储 AI 思考内容到缓存
          aiThinkingCache.set(entry.requestId, {
            content: entry.data.response || '',
            chunks: entry.data.chunkCount || 0,
            duration: entry.data.streamDuration || 0
          })
          
          // 更新已存在的 TOOL CALL 条目的显示
          updateToolCallsWithThinking(entry.requestId)
          
          // 更新统计但不添加到日志列表
          activeRequests.delete(entry.requestId)
          updateStats()
          return
        }
        
        logs.push(entry)
        
        // 更新统计
        if (entry.type === 'request_start') {
          stats.requests++
          activeRequests.add(entry.requestId)
        } else if (entry.type === 'tool_call') {
          stats.toolCalls++
        } else if (entry.type === 'response_error') {
          stats.errors++
        } else if (entry.type === 'response_done' || entry.type === 'response_error') {
          activeRequests.delete(entry.requestId)
        }
        
        updateStats()
        
        // 如果当前过滤器匹配，添加到列表
        if (currentFilter === 'all' || currentFilter === entry.type) {
          // 移除空状态
          const empty = logList.querySelector('.empty-state')
          if (empty) empty.remove()
          
          logList.appendChild(createLogElement(entry))
          
          if (autoScroll) {
            logList.scrollTop = logList.scrollHeight
          }
        }
      }
      
      // 更新 TOOL CALL 条目，添加 AI 思考内容
      function updateToolCallsWithThinking(requestId) {
        const thinking = aiThinkingCache.get(requestId)
        if (!thinking) return
        
        // 找到所有属于这个 requestId 的 tool_call 元素
        const toolCallElements = logList.querySelectorAll(`[data-type="tool_call"][data-request-id="${requestId}"]`)
        toolCallElements.forEach(el => {
          // 如果还没添加思考内容，添加到 log-content 的开头
          if (!el.querySelector('.ai-thinking-section')) {
            const logContent = el.querySelector('.log-content')
            if (logContent && thinking.content) {
              const thinkingHtml = `
                <div class="ai-thinking-section">
                  <div class="ai-thinking-header">💭 AI 思考</div>
                  <div class="ai-thinking-content">${escapeHtml(thinking.content)}</div>
                  <div class="ai-thinking-meta">${thinking.chunks} chunks | ${thinking.duration}ms</div>
                </div>
              `
              logContent.insertAdjacentHTML('afterbegin', thinkingHtml)
            }
          }
        })
      }
      
      // 处理流式响应 chunk
      function handleResponseChunk(entry) {
        const requestId = entry.requestId
        const chunk = entry.data.chunk || ''
        
        if (!streamingResponses.has(requestId)) {
          // 创建新的聚合条目
          const streamingEntry = {
            id: `streaming_${requestId}`,
            type: 'response_streaming',
            timestamp: entry.timestamp,
            requestId: requestId,
            data: {
              content: chunk,
              chunkCount: 1,
              startTime: entry.timestamp,
              lastTime: entry.timestamp
            }
          }
          
          streamingResponses.set(requestId, streamingEntry)
          logs.push(streamingEntry)
          
          // 添加到 UI
          if (currentFilter === 'all' || currentFilter === 'response_chunk' || currentFilter === 'response_streaming') {
            const empty = logList.querySelector('.empty-state')
            if (empty) empty.remove()
            
            logList.appendChild(createLogElement(streamingEntry))
          }
        } else {
          // 更新现有聚合条目
          const streamingEntry = streamingResponses.get(requestId)
          streamingEntry.data.content += chunk
          streamingEntry.data.chunkCount++
          streamingEntry.data.lastTime = entry.timestamp
          
          // 更新 UI 中的显示
          updateStreamingElement(streamingEntry)
        }
        
        if (autoScroll) {
          logList.scrollTop = logList.scrollHeight
        }
      }
      
      // 更新流式响应元素
      function updateStreamingElement(entry) {
        const element = logList.querySelector(`[data-id="${entry.id}"]`)
        if (element) {
          const summary = getLogSummary(entry)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
          
          element.querySelector('.log-summary').textContent = summary
          
          // 如果已展开，更新内容
          if (element.classList.contains('expanded')) {
            element.querySelector('.log-content').innerHTML = renderLogContent(entry)
          }
        }
      }
      
      // 完成流式响应
      function finalizeStreaming(requestId, doneEntry) {
        const streamingEntry = streamingResponses.get(requestId)
        if (streamingEntry) {
          // 更新 response_done 的数据，包含完整的响应内容
          if (doneEntry.type === 'response_done' && !doneEntry.data.response) {
            doneEntry.data.response = streamingEntry.data.content
          }
          doneEntry.data.chunkCount = streamingEntry.data.chunkCount
          doneEntry.data.streamDuration = streamingEntry.data.lastTime - streamingEntry.data.startTime
          
          // 从 logs 中移除 streaming 条目
          const idx = logs.findIndex(l => l.id === streamingEntry.id)
          if (idx >= 0) {
            logs.splice(idx, 1)
          }
          
          // 从 UI 中移除 streaming 元素
          const element = logList.querySelector(`[data-id="${streamingEntry.id}"]`)
          if (element) {
            element.remove()
          }
          
          // 清理 map
          streamingResponses.delete(requestId)
        }
      }

      // 更新统计
      function updateStats() {
        requestCountEl.textContent = stats.requests
        toolCallCountEl.textContent = stats.toolCalls
        errorCountEl.textContent = stats.errors
        streamingStatus.style.display = activeRequests.size > 0 ? 'block' : 'none'
      }

      // 清除日志
      async function clearLogs() {
        logs = []
        stats = { requests: 0, toolCalls: 0, errors: 0 }
        activeRequests.clear()
        streamingResponses.clear()
        aiThinkingCache.clear()
        updateStats()
        renderLogs()
        
        // 通知主进程
        if (window.electronAPI) {
          await window.electronAPI.aiDebugClearLogs()
        }
      }

      // Toast 提示
      function showToast(message, type = 'info') {
        // 移除旧的 toast
        const oldToast = document.querySelector('.toast')
        if (oldToast) oldToast.remove()
        
        const toast = document.createElement('div')
        toast.className = `toast ${type}`
        toast.textContent = message
        document.body.appendChild(toast)
        
        // 显示
        requestAnimationFrame(() => {
          toast.classList.add('show')
        })
        
        // 自动隐藏
        setTimeout(() => {
          toast.classList.remove('show')
          setTimeout(() => toast.remove(), 300)
        }, 2000)
      }

      // 复制文本到剪贴板
      async function copyToClipboard(text) {
        try {
          await navigator.clipboard.writeText(text)
          return true
        } catch (err) {
          console.error('Failed to copy:', err)
          return false
        }
      }

      // 复制单个日志条目
      async function copyEntry(entryId) {
        const entry = logs.find(e => e.id === entryId)
        if (entry) {
          const text = JSON.stringify(entry, null, 2)
          if (await copyToClipboard(text)) {
            showToast('已复制到剪贴板', 'success')
          }
        }
      }

      // 复制所有日志
      async function copyAllLogs() {
        if (logs.length === 0) {
          showToast('没有日志可复制')
          return
        }
        
        const text = logs.map(entry => {
          const time = new Date(entry.timestamp).toISOString()
          return `[${time}] [${entry.type}] ${JSON.stringify(entry.data)}`
        }).join('\n')
        
        if (await copyToClipboard(text)) {
          showToast(`已复制 ${logs.length} 条日志`, 'success')
        }
      }

      // 复制日志文件路径
      async function copyLogFilePath() {
        const pathEl = document.getElementById('logFilePath')
        const path = pathEl.textContent
        if (path && path !== '正在创建...' && path !== '无') {
          if (await copyToClipboard(path)) {
            showToast('路径已复制', 'success')
          }
        }
      }

      // 打开日志目录
      async function openLogDir() {
        if (window.electronAPI) {
          const logDir = await window.electronAPI.aiDebugGetLogDir()
          if (logDir) {
            // 使用 shell.openPath 打开目录
            window.electronAPI.shell.openPath(logDir)
          }
        }
      }

      // 更新日志文件路径显示
      async function updateLogFilePath() {
        if (window.electronAPI) {
          const path = await window.electronAPI.aiDebugGetLogFilePath()
          const pathEl = document.getElementById('logFilePath')
          pathEl.textContent = path || '无'
          pathEl.title = path || ''
        }
      }

      // 监听来自主进程的消息
      if (window.electronAPI) {
        window.electronAPI.onAiDebugMessage((message) => {
          if (message.type === 'log') {
            addLog(message.entry)
          } else if (message.type === 'clear') {
            logs = []
            stats = { requests: 0, toolCalls: 0, errors: 0 }
            activeRequests.clear()
            streamingResponses.clear()
            aiThinkingCache.clear()
            updateStats()
            renderLogs()
          }
        })
        
        // 获取历史日志
        window.electronAPI.aiDebugGetLogs().then(existingLogs => {
          if (existingLogs && existingLogs.length > 0) {
            existingLogs.forEach(addLog)
          }
        })

        // 更新日志文件路径
        updateLogFilePath()
        // 定期更新（以防文件创建有延迟）
        setTimeout(updateLogFilePath, 1000)
      }
    </script>
  </body>
</html>
